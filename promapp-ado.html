<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProMapp · Εργασίες</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════════
   ProMapp ADO — visual language inspired by Azure DevOps:
   light + neutral by default with dark mode option. Tight, dense, work-
   first. Blue accents, type icons, monospace IDs.
   ═══════════════════════════════════════════════════════════════════ */

:root{
  /* light theme defaults */
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface2: #fafafa;
  --hover: #f2f2f2;
  --border: #e1e1e1;
  --border2: #d0d0d0;
  --text: #1f1f1f;
  --text2: #4a4a4a;
  --muted: #767676;
  --blue: #0078d4;
  --blue-h: #106ebe;
  --blue-dim: #deecf9;
  --red: #d13438;
  --red-dim: #fde7e9;
  --orange: #d83b01;
  --orange-dim: #fed9cc;
  --green: #107c10;
  --green-dim: #dff6dd;
  --purple: #5c2d91;
  --purple-dim: #e8e0f0;
  --yellow: #ffaa44;
  --yellow-dim: #fff4ce;
  --shadow: 0 1.6px 3.6px rgba(0,0,0,.13), 0 .3px .9px rgba(0,0,0,.10);
  --shadow-lg: 0 6.4px 14.4px rgba(0,0,0,.13), 0 1.2px 3.6px rgba(0,0,0,.10);
  --r: 4px;
  --rm: 6px;
  --hd: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}
[data-theme=dark]{
  --bg: #1b1b1b;
  --surface: #252525;
  --surface2: #2d2d2d;
  --hover: #333;
  --border: #3a3a3a;
  --border2: #4a4a4a;
  --text: #f3f3f3;
  --text2: #cccccc;
  --muted: #999;
  --blue: #58a6ff;
  --blue-h: #79b8ff;
  --blue-dim: #1a3a5c;
  --red: #f87171;
  --red-dim: #4a1f1f;
  --orange: #ff8c5a;
  --orange-dim: #4a2a1a;
  --green: #4ade80;
  --green-dim: #1a3a1f;
  --purple: #a78bfa;
  --purple-dim: #2a1a4a;
  --yellow: #fbbf24;
  --yellow-dim: #3a2a0a;
  --shadow: 0 1.6px 3.6px rgba(0,0,0,.45), 0 .3px .9px rgba(0,0,0,.3);
  --shadow-lg: 0 6.4px 14.4px rgba(0,0,0,.45), 0 1.2px 3.6px rgba(0,0,0,.3);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--hd);font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
html,body{overflow-x:hidden;max-width:100%}
button{cursor:pointer;font-family:inherit;font-size:inherit;border:none;background:transparent;color:inherit}
button:disabled{cursor:not-allowed;opacity:.5}
input,select,textarea{font-family:inherit;font-size:inherit;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
textarea{resize:vertical;min-height:60px;font-family:var(--hd)}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* ─── BOOT/AUTH ─── */
.center{display:grid;place-items:center;min-height:100vh;padding:20px}
.auth{background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);padding:28px;max-width:380px;width:100%;box-shadow:var(--shadow)}
.auth h1{font-size:22px;font-weight:600;margin-bottom:4px;letter-spacing:-.01em}
.auth .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
.auth .field{margin-bottom:12px}
.auth label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.auth input{width:100%}
.auth button.primary{width:100%;background:var(--blue);color:#fff;padding:8px;border-radius:var(--r);font-weight:600;margin-top:8px}
.auth button.primary:hover{background:var(--blue-h)}
.auth .switch{margin-top:14px;text-align:center;font-size:13px;color:var(--muted)}
.auth .switch a{cursor:pointer}

/* ─── APP SHELL ─── */
.app{display:none;height:100vh;flex-direction:column}
.app.show{display:flex}
.topbar{display:flex;align-items:center;gap:10px;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);min-height:44px;flex-shrink:0}
.topbar .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:var(--text)}
.topbar .logo .mark{width:24px;height:24px;background:var(--blue);color:#fff;border-radius:var(--r);display:grid;place-items:center;font-weight:700;font-size:13px}
.topbar .crumb{color:var(--muted);font-size:13px}
.topbar .crumb span{color:var(--text2);font-weight:500}
.topbar .crumb .sep{margin:0 6px;color:var(--border2)}
.topbar .spacer{flex:1}
.topbar .ws-pick{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px 10px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px}
.topbar .ws-pick:hover{background:var(--hover)}
.topbar .iconbtn{width:32px;height:32px;border-radius:var(--r);display:grid;place-items:center;color:var(--text2)}
.topbar .iconbtn:hover{background:var(--hover);color:var(--text)}
.topbar .user{display:flex;align-items:center;gap:6px;padding:2px 8px 2px 4px;border-radius:999px;background:var(--surface2);border:1px solid var(--border)}
.topbar .user .av{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:600}
.topbar .user .nm{font-size:12px;font-weight:500}

/* Search */
.search-wrap{position:relative;flex:0 1 320px;max-width:320px}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:var(--r);font-size:12px}
.search-wrap input:focus{background:var(--surface);border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
.search-results{position:absolute;top:34px;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);box-shadow:var(--shadow-lg);max-height:60vh;overflow-y:auto;z-index:180}
.search-results .sr-item{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);font-size:13px}
.search-results .sr-item:last-child{border-bottom:none}
.search-results .sr-item:hover{background:var(--hover)}
.search-results .sr-item .type-ico{font-size:14px;flex-shrink:0}
.search-results .sr-item .id{font-family:var(--mono);color:var(--muted);font-size:11px;flex-shrink:0}
.search-results .sr-item .ti{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-results .sr-item .proj{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.search-results .sr-empty{padding:14px;text-align:center;color:var(--muted);font-style:italic;font-size:12px}
.search-results .sr-loading{padding:14px;text-align:center;color:var(--muted);font-size:12px}
@media (max-width:720px){
  .search-wrap{flex:1;max-width:none}
  .topbar .crumb{display:none}
}

/* ─── MAIN LAYOUT ─── */
.main{flex:1;display:flex;min-height:0;overflow:hidden}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-project{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-project .icon{width:28px;height:28px;border-radius:var(--r);background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px}
.sb-project .nm{font-weight:600;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-project .add{width:24px;height:24px;border-radius:var(--r);display:grid;place-items:center;color:var(--muted)}
.sb-project .add:hover{background:var(--hover);color:var(--text)}

.sb-nav{padding:6px 0;flex:1}
.sb-nav button{display:flex;align-items:center;gap:10px;width:100%;padding:7px 14px;text-align:left;color:var(--text2);font-size:13px;font-weight:500;border-left:2px solid transparent}
.sb-nav button:hover{background:var(--hover);color:var(--text)}
.sb-nav button.active{background:var(--blue-dim);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.sb-nav button .ico{font-size:14px;width:18px;display:inline-block;text-align:center}
.sb-nav .group{padding:10px 14px 4px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}

.sb-projects-list{padding:4px 0 6px;border-bottom:1px solid var(--border);max-height:32vh;overflow-y:auto}
.sb-projects-list .proj-list-head{display:flex;align-items:center;gap:8px;padding:8px 14px 4px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;cursor:pointer;user-select:none}
.sb-projects-list .proj-list-head:hover{color:var(--text)}
.sb-projects-list .proj-list-head .chev{font-size:9px;transition:transform .15s;display:inline-block}
.sb-projects-list .proj-list-head .chev.open{transform:rotate(90deg)}
.sb-projects-list .pi{display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--text2)}
.sb-projects-list .pi .pi-edit{opacity:0;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:var(--r)}
.sb-projects-list .pi:hover .pi-edit{opacity:.7}
.sb-projects-list .pi .pi-edit:hover{opacity:1;background:var(--hover)}
.sb-projects-list .pi:hover{background:var(--hover);color:var(--text)}
.sb-projects-list .pi.active{background:var(--blue-dim);color:var(--blue);font-weight:600}
.sb-projects-list .pi .hash{color:var(--muted);font-family:var(--mono);font-size:11px}
.sb-projects-list .empty{padding:12px 14px;color:var(--muted);font-style:italic;font-size:12px}

.workarea{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.subtopbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.subtopbar h1{font-size:18px;font-weight:600;color:var(--text)}
.subtopbar .tabs{display:flex;gap:0;margin-left:14px}
.subtopbar .tab{padding:6px 14px;border-bottom:2px solid transparent;color:var(--text2);font-weight:500;font-size:13px;cursor:pointer}
.subtopbar .tab:hover{color:var(--text)}
.subtopbar .tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.subtopbar .spacer{flex:1}
.subtopbar .actions{display:flex;gap:6px;align-items:center}

.btn{padding:5px 12px;border-radius:var(--r);background:var(--blue);color:#fff;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--blue-h)}
.btn.ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn.ghost:hover{background:var(--hover);color:var(--text)}
.btn.danger{background:var(--red);color:#fff}
.btn.sm{padding:3px 8px;font-size:12px}

.page{flex:1;overflow:auto;background:var(--bg)}
.hidden{display:none !important}

/* ═══════════════════════════════════════════════════════════════════
   BOARD (KANBAN)
   ══════════════════════════════════════════════════════════════════ */
.board{padding:14px;display:flex;gap:12px;height:100%;overflow-x:auto;overflow-y:hidden}
.col{flex:0 0 280px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);display:flex;flex-direction:column;max-height:100%;min-height:200px}
.col-h{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:var(--rm) var(--rm) 0 0}
.col-h .ti{font-weight:600;font-size:14px;flex:1}
.col-h .cnt{color:var(--muted);font-size:12px;font-family:var(--mono)}
.col-h .cnt.over{color:var(--red);font-weight:600}
.col-body{padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;min-height:60px}
.card{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:var(--r);padding:8px 10px;cursor:pointer;display:flex;flex-direction:column;gap:6px;transition:.12s}
.card:hover{box-shadow:var(--shadow);border-color:var(--border2)}
.card.t-epic   {border-left-color:var(--purple)}
.card.t-feature{border-left-color:var(--orange)}
.card.t-story  {border-left-color:var(--blue)}
.card.t-task   {border-left-color:var(--yellow)}
.card.t-bug    {border-left-color:var(--red)}
.card .row1{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}

/* Drag-and-drop visual feedback */
.drag-ghost{opacity:.4;background:var(--blue-dim) !important;border:1px dashed var(--blue) !important}
.drag-chosen{box-shadow:var(--shadow-lg)}
.drag-active{cursor:grabbing}
.col-body.drag-over-empty{background:var(--blue-dim) !important}

/* ═══════════════════════════════════════════════════════════════════
   SPRINTS PAGE
   ══════════════════════════════════════════════════════════════════ */
.sprints-wrap{padding:14px 16px;height:100%;display:flex;flex-direction:column}
.sprints-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sprints-toolbar select{font-size:13px;padding:4px 8px;min-width:200px}
.sp-empty{padding:60px 20px;text-align:center;color:var(--muted)}
.sp-empty .ti{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}
.sp-stats{display:flex;gap:14px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);margin-bottom:10px;flex-wrap:wrap}
.sp-stats .stat{font-size:12px;color:var(--muted)}
.sp-stats .stat strong{font-size:18px;color:var(--text);display:block;font-weight:600}
.sp-board{flex:1;display:flex;gap:12px;overflow-x:auto;min-height:0}
.sp-board .col{flex:0 0 280px}

/* ═══════════════════════════════════════════════════════════════════
   TAGS
   ══════════════════════════════════════════════════════════════════ */
.tag-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:2px;font-size:11px;font-weight:600;line-height:1.5;background:var(--blue-dim);color:var(--blue);cursor:default;white-space:nowrap}
.tag-chip.t-0{background:#deecf9;color:#0078d4}
.tag-chip.t-1{background:#e8e0f0;color:#5c2d91}
.tag-chip.t-2{background:#fed9cc;color:#d83b01}
.tag-chip.t-3{background:#fff4ce;color:#a67000}
.tag-chip.t-4{background:#dff6dd;color:#107c10}
.tag-chip.t-5{background:#fde7e9;color:#d13438}
.tag-chip.t-6{background:#cce4f0;color:#005a9e}
.tag-chip.t-7{background:#fdf2cc;color:#8a6a00}
[data-theme=dark] .tag-chip.t-0{background:#1a3a5c;color:#79b8ff}
[data-theme=dark] .tag-chip.t-1{background:#2a1a4a;color:#c4a8f5}
[data-theme=dark] .tag-chip.t-2{background:#4a2a1a;color:#ff8c5a}
[data-theme=dark] .tag-chip.t-3{background:#3a2a0a;color:#fbbf24}
[data-theme=dark] .tag-chip.t-4{background:#1a3a1f;color:#4ade80}
[data-theme=dark] .tag-chip.t-5{background:#4a1f1f;color:#f87171}
[data-theme=dark] .tag-chip.t-6{background:#1a2a3f;color:#7cb3ed}
[data-theme=dark] .tag-chip.t-7{background:#3a2f0a;color:#e8c060}
.tag-chip .x{cursor:pointer;margin-left:2px;opacity:.6;font-size:11px}
.tag-chip .x:hover{opacity:1}
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:4px;padding:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);min-height:32px;align-items:center}
.tag-input-wrap input{border:none;flex:1;min-width:120px;padding:2px 4px;background:transparent}
.tag-input-wrap input:focus{box-shadow:none}
.tag-input-wrap .btn.sm{padding:3px 10px;font-size:11px;flex-shrink:0}

/* ═══════════════════════════════════════════════════════════════════
   MARKDOWN RENDERED CONTENT
   ══════════════════════════════════════════════════════════════════ */
.md-body{font-size:13px;line-height:1.55;color:var(--text)}
.md-body p{margin:0 0 8px}
.md-body p:last-child{margin-bottom:0}
.md-body strong{font-weight:600}
.md-body em{font-style:italic}
.md-body code{font-family:var(--mono);font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:1px 5px}
.md-body pre{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;overflow-x:auto;font-family:var(--mono);font-size:12px;margin:6px 0}
.md-body pre code{background:none;border:none;padding:0}
.md-body ul, .md-body ol{margin:0 0 8px 22px}
.md-body li{margin-bottom:3px}
.md-body h1{font-size:18px;font-weight:600;margin:10px 0 6px}
.md-body h2{font-size:15px;font-weight:600;margin:8px 0 4px}
.md-body h3{font-size:14px;font-weight:600;margin:6px 0 4px}
.md-body a{color:var(--blue);text-decoration:underline}
.md-body blockquote{border-left:3px solid var(--border2);padding-left:10px;color:var(--text2);margin:6px 0}
.md-body .md-img{max-width:100%;max-height:380px;border-radius:var(--r);border:1px solid var(--border);display:inline-block;margin:6px 0;cursor:zoom-in;background:var(--surface2)}
.md-hint{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic}

/* Attachment upload UI */
.attach-bar{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.attach-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer}
.attach-btn:hover{background:var(--hover);color:var(--text)}
.attach-btn .ico{font-size:13px}
.attach-status{font-size:11px;color:var(--muted);font-style:italic}
.attach-status.err{color:var(--red);font-style:normal;font-weight:500}
.drag-zone-on{outline:2px dashed var(--blue);outline-offset:-4px;background:var(--blue-dim) !important}

/* @mention chips inside rendered comments */
.mention{background:var(--blue-dim);color:var(--blue);padding:1px 5px;border-radius:3px;font-weight:600;font-size:.95em}

/* Mention autocomplete popover under the comment input */
.mention-pop{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);box-shadow:var(--shadow-lg);max-height:200px;overflow-y:auto;z-index:160;min-width:200px}
.mention-pop .mp-item{padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px}
.mention-pop .mp-item:hover, .mention-pop .mp-item.sel{background:var(--blue-dim);color:var(--blue)}
.mention-pop .mp-av{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:600;flex-shrink:0}
.mention-pop .mp-empty{padding:10px 12px;color:var(--muted);font-style:italic;font-size:12px}

/* Inbox bell in topbar */
.bell{position:relative;width:32px;height:32px;border-radius:var(--r);display:grid;place-items:center;color:var(--text2)}
.bell:hover{background:var(--hover);color:var(--text)}
.bell .dot{position:absolute;top:4px;right:5px;width:8px;height:8px;border-radius:50%;background:var(--red);border:1.5px solid var(--surface)}
.bell.has-unread .dot{display:block}
.bell.other-ws-unread .dot{display:block;background:var(--muted)}
.bell .dot{display:none}
.bell .count{position:absolute;top:0px;right:-2px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:999px;padding:1px 5px;min-width:14px;text-align:center;line-height:1.2}

/* Inbox panel */
.inbox-panel{position:absolute;right:8px;top:46px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);box-shadow:var(--shadow-lg);width:360px;max-height:60vh;overflow-y:auto;z-index:170}
.inbox-h{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.inbox-h h3{font-size:14px;font-weight:600;flex:1}
.inbox-empty{padding:30px 14px;text-align:center;color:var(--muted);font-style:italic;font-size:13px}
.inbox-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px}
.inbox-item:last-child{border-bottom:none}
.inbox-item:hover{background:var(--hover)}
.inbox-item .head{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.inbox-item .head .id{font-family:var(--mono);font-weight:600}
.inbox-item .head .notif-ico{font-size:12px}
.watch-btn.watching{background:var(--blue-dim) !important;color:var(--blue) !important;border-color:var(--blue) !important}
.watch-btn .watch-count{font-family:var(--mono);font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:0 5px;margin-left:2px}
.inbox-item .body{color:var(--text);line-height:1.4}
.inbox-item .ts{font-size:10px;color:var(--muted);margin-top:3px}
.inbox-item.is-read{opacity:.55}
.inbox-item.is-read:hover{opacity:.8}
.inbox-section{padding:6px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);border-top:1px solid var(--border)}
.inbox-otherws{padding:8px 14px;font-size:12px;color:var(--muted);text-align:center;border-bottom:1px solid var(--border)}


.activity{display:flex;flex-direction:column;gap:8px}
.act{display:flex;gap:8px;align-items:flex-start}
.act-av{width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--text2);display:grid;place-items:center;font-size:10px;font-weight:600;flex-shrink:0}
.act-body{flex:1;min-width:0;font-size:12px;line-height:1.45}
.act-body strong{font-weight:600;color:var(--text)}
.act-ts{font-size:10px;color:var(--muted);margin-top:2px}

/* Overview tabs + lists */
.ov-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);padding:14px}
.ov-stat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.ov-stat-v{font-size:28px;font-weight:600;color:var(--blue);margin-top:2px}
.cbar{height:6px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);overflow:hidden}
.cbar-fill{height:100%;background:var(--blue);border-radius:999px;transition:width .3s ease}
.ov-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px}
.ov-tab{padding:8px 14px;border-bottom:2px solid transparent;color:var(--text2);font-weight:500;font-size:13px;cursor:pointer;background:transparent;border-top:none;border-left:none;border-right:none}
.ov-tab:hover{color:var(--text)}
.ov-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.ov-list{background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);overflow:hidden}
.ov-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px}
.ov-row:last-child{border-bottom:none}
.ov-row:hover{background:var(--hover)}
.ov-row .state{font-size:10px;padding:1px 6px;border-radius:2px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:inline-block;margin-left:6px}
.ov-row .state.s-new{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.ov-row .state.s-active{background:var(--blue-dim);color:var(--blue)}
.ov-row .state.s-resolved{background:var(--yellow-dim);color:#a67000}
.ov-row .state.s-closed{background:var(--green-dim);color:var(--green)}
.ov-row .av{width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:600;flex-shrink:0}
.settings-col-row:hover{background:var(--hover)}
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);padding:16px;margin-bottom:16px}
.team-h{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:12px}
.mem-list{display:flex;flex-direction:column}
.mem-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.mem-row:last-child{border-bottom:none}
.mem-av{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:600;flex-shrink:0}


.cf-md{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;min-height:36px;cursor:text;font-size:13px;line-height:1.5}
.cf-md:hover{border-color:var(--border2)}
.cf-md.empty{color:var(--muted);font-style:italic}
.card .row1 .type-ico{font-size:13px}
.card .row1 .id{font-family:var(--mono);font-weight:600}
.card .row1 .pts{margin-left:auto;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:1px 7px;font-family:var(--mono);font-weight:600;color:var(--text2)}
.card .ti{font-size:13px;font-weight:500;color:var(--text);line-height:1.35}
.card .row3{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.card .row3 .av{width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:600}
.card .row3 .children{display:inline-flex;align-items:center;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:1px 6px;font-family:var(--mono)}
.card .row3 .tag{background:var(--blue-dim);color:var(--blue);padding:0 6px;border-radius:2px;font-size:10px;font-weight:600}
.card .row3 .pri{font-weight:600;padding:0 6px;border-radius:2px}
.card .row3 .pri.p1{background:var(--red-dim);color:var(--red)}
.card .row3 .pri.p2{background:var(--orange-dim);color:var(--orange)}
.card .row3 .pri.p3{background:var(--blue-dim);color:var(--blue)}
.card .row3 .pri.p4{background:var(--surface);color:var(--muted)}

.add-card{margin-top:auto;padding:8px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);text-align:center;cursor:pointer;border-radius:0 0 var(--rm) var(--rm)}
.add-card:hover{background:var(--hover);color:var(--text)}

/* ═══════════════════════════════════════════════════════════════════
   BACKLOG (LIST)
   ══════════════════════════════════════════════════════════════════ */
.backlog{padding:14px 16px}
.backlog-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.saved-views{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.saved-views:empty{display:none}
.sv-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:var(--surface);border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer}
.sv-chip:hover{background:var(--hover);color:var(--text);border-color:var(--border2)}
.sv-chip.active{background:var(--blue-dim);color:var(--blue);border-color:var(--blue)}
.sv-chip .x{opacity:.5;font-size:13px;cursor:pointer;margin-left:2px}
.sv-chip .x:hover{opacity:1}
.sv-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-right:2px}
.backlog-toolbar select{padding:4px 8px;font-size:13px}
.bl-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
#bl-tree{display:block}
.bl-h{display:grid;grid-template-columns:24px 40px 80px 1fr 140px 120px 80px;gap:8px;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.bl-row{display:grid;grid-template-columns:24px 40px 80px 1fr 140px 120px 80px;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;align-items:center;position:relative;background:var(--surface)}
.bl-row:hover{background:var(--hover)}
.bl-row:last-child{border-bottom:none}
.bl-row .drag-handle{cursor:grab;color:var(--muted);font-size:11px;letter-spacing:-2px;opacity:0;display:grid;place-items:center;user-select:none;touch-action:none}
.bl-row:hover .drag-handle{opacity:1}
.bl-row .drag-handle:active{cursor:grabbing}
.bl-row .expand{width:20px;height:20px;display:grid;place-items:center;color:var(--muted);cursor:pointer;border-radius:var(--r);font-size:10px}
.bl-row .expand:hover{background:var(--hover)}
.bl-row .expand.open{transform:rotate(90deg)}
.bl-row .expand.none{visibility:hidden}
.bl-row .id-cell{display:flex;align-items:center;gap:6px}
.bl-row .id-cell .type-ico{font-size:14px}
.bl-row .id-cell .id{font-family:var(--mono);font-size:12px;color:var(--muted);font-weight:600}
.bl-row .title-cell{display:flex;align-items:center;gap:6px;min-width:0}
.bl-row .title-cell .ti{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bl-row .add-child{visibility:hidden;width:22px;height:22px;border-radius:var(--r);display:grid;place-items:center;color:var(--blue);background:var(--blue-dim);font-weight:700;font-size:14px;cursor:pointer}
.bl-row:hover .add-child{visibility:visible}
.bl-row .add-child:hover{background:var(--blue);color:#fff}
.bl-row .av-name{display:flex;align-items:center;gap:6px;font-size:12px}
.bl-row .av-name .av{width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:600}
.bl-row .state{font-size:11px;padding:2px 8px;border-radius:2px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:inline-block}
.bl-row .state.s-new{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.bl-row .state.s-active{background:var(--blue-dim);color:var(--blue)}
.bl-row .state.s-resolved{background:var(--yellow-dim);color:#a67000}
.bl-row .state.s-closed{background:var(--green-dim);color:var(--green)}
.bl-row .rem-work{font-family:var(--mono);font-size:12px;color:var(--text2);text-align:right;padding-right:8px}
.bl-row.depth-1{padding-left:40px}
.bl-row.depth-2{padding-left:64px}
.bl-row.depth-3{padding-left:88px}
.bl-row.depth-4{padding-left:112px}
.bl-empty{padding:40px;text-align:center;color:var(--muted);font-style:italic}

.add-row{display:grid;grid-template-columns:40px 80px 1fr auto;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);align-items:center;background:var(--blue-dim)}
.add-row select,.add-row input{font-size:13px}
.add-row input{width:100%}

/* Inline-add picker menu (the "+ Add child" on backlog rows) */
.add-menu{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);box-shadow:var(--shadow-lg);padding:4px;min-width:180px;z-index:100}
.add-menu .item{padding:8px 12px;cursor:pointer;font-size:13px;border-radius:var(--r);display:flex;align-items:center;gap:8px}
.add-menu .item:hover{background:var(--hover)}
.add-menu .item .type-ico{font-size:14px}

/* ═══════════════════════════════════════════════════════════════════
   WORK ITEM DETAIL (full-screen)
   ══════════════════════════════════════════════════════════════════ */
.detail{height:100%;display:flex;flex-direction:column;background:var(--surface)}
.det-top{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--surface2)}
.det-top .back{padding:4px 8px;color:var(--text2);border-radius:var(--r);font-weight:500}
.det-menu-wrap{position:relative}
.det-menu-btn{font-size:18px;line-height:1;padding:2px 8px}
.det-menu{position:absolute;top:100%;left:0;margin-top:4px;z-index:70;background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);box-shadow:0 6px 20px rgba(0,0,0,.16);min-width:160px;padding:4px;display:flex;flex-direction:column}
.det-menu-item{text-align:left;padding:8px 12px;border-radius:var(--r);font-size:13px;color:var(--text);background:transparent;border:none;cursor:pointer}
.det-menu-item:hover{background:var(--hover)}
.det-menu-item.danger{color:var(--red)}
.det-top .back:hover{background:var(--hover);color:var(--text)}
.det-top .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);font-family:var(--mono);font-size:12px;font-weight:600}
.det-top .badge .type-ico{font-size:14px}
.det-top h2{font-size:18px;font-weight:600;flex:1;min-width:200px}
.det-top h2 .id{font-family:var(--mono);color:var(--muted);font-weight:500;margin-right:8px}
.det-top .spacer{flex:1}

.det-body{flex:1;display:grid;grid-template-columns:1fr 320px;gap:0;overflow:hidden;min-height:0}
.det-info-btn{display:none}
.det-backdrop{display:none}
@media (max-width:900px){
  /* Single column: main content (title/desc/chat) is the page. */
  .det-body{grid-template-columns:1fr;overflow-y:auto}
  .det-left{order:1;overflow-y:visible}
  /* The details column becomes an off-canvas drawer sliding in from the right. */
  .det-right{
    order:2;
    position:fixed;
    top:0; right:0; bottom:0;
    width:86%; max-width:340px;
    z-index:60;
    transform:translateX(100%);
    transition:transform .22s ease;
    overflow-y:auto;
    border-left:1px solid var(--border);
    box-shadow:-2px 0 16px rgba(0,0,0,.18);
  }
  .det-right.open{transform:translateX(0)}
  .det-backdrop{
    position:fixed; inset:0; z-index:55;
    background:rgba(0,0,0,.4);
    opacity:0; pointer-events:none; transition:opacity .22s ease;
  }
  .det-backdrop.open{display:block; opacity:1; pointer-events:auto}
  .det-info-btn{display:inline-flex}
}
.det-left{padding:18px 22px;overflow-y:auto;border-right:1px solid var(--border)}
.det-right{padding:18px 22px;overflow-y:auto;background:var(--surface2);font-size:13px}

.det-section{margin-bottom:22px}
.det-section h3{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
/* Collapsible sections (title/description/discussion) */
.det-section.collapsible > h3{cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
.det-section.collapsible > h3 .chev{font-size:9px;transition:transform .15s;color:var(--muted)}
.det-section.collapsible.open > h3 .chev{transform:rotate(90deg)}
.det-section.collapsible > .sec-body{overflow:hidden}
.det-section.collapsible:not(.open) > .sec-body{display:none}
.det-field{margin-bottom:14px}
.det-field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.det-field input,.det-field select,.det-field textarea{width:100%}
.det-field .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.det-title-input{font-size:18px !important;font-weight:600 !important;padding:8px 10px !important}

.det-desc{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px;min-height:80px;cursor:text;font-size:13px;line-height:1.5}
.det-desc:hover{border-color:var(--border2)}
.det-desc.empty{color:var(--muted);font-style:italic}
.det-desc-edit{width:100%;min-height:140px;font-size:13px;line-height:1.5;font-family:var(--mono)}

.related{display:flex;flex-direction:column;gap:8px}
.related .ri{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer}
.related .ri:hover{background:var(--hover);border-color:var(--border2)}
.related .ri .type-ico{font-size:13px}
.related .ri .id{font-family:var(--mono);font-weight:600;color:var(--muted)}
.related .ri .ti{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.related .ri .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600}
.related .add-related{display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px dashed var(--border2);border-radius:var(--r);color:var(--muted);font-size:12px;cursor:pointer;justify-content:center}
.related .add-related:hover{border-color:var(--blue);color:var(--blue)}

/* Discussion (comments) */
.comments{display:flex;flex-direction:column;gap:12px}
.comment{display:flex;gap:10px}
.comment .av{width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:600;flex-shrink:0}
.comment .body{flex:1;min-width:0}
.comment .head{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.comment .head .nm{font-weight:600;font-size:13px}
.comment .head .ts{font-size:11px;color:var(--muted)}
.comment .text{font-size:13px;line-height:1.5}
.comment .cmt-actions{margin-left:auto;display:flex;gap:2px;opacity:0;transition:opacity .15s}
.comment:hover .cmt-actions{opacity:1}
.cmt-act-btn{width:22px;height:22px;border-radius:var(--r);display:grid;place-items:center;color:var(--muted);font-size:12px;background:transparent;border:none;cursor:pointer}
.cmt-act-btn:hover{background:var(--hover);color:var(--text)}
.comment-input-wrap{margin-top:14px;display:flex;flex-direction:column;gap:6px}
.comment-input-wrap textarea{width:100%;min-height:60px}

/* ─── MODAL / DROPDOWN ─── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:grid;place-items:center;padding:20px}
.modal{background:var(--surface);border-radius:var(--rm);max-width:480px;width:100%;max-height:90vh;overflow:auto;box-shadow:var(--shadow-lg)}
.modal-h{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-h h3{font-size:16px;font-weight:600;flex:1}
.modal-h .x{width:28px;height:28px;border-radius:var(--r);display:grid;place-items:center;color:var(--muted);font-size:18px}
.modal-h .x:hover{background:var(--hover);color:var(--text)}
.modal-b{padding:16px 18px}
.modal-b .field{margin-bottom:12px}
.modal-b label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.modal-b input,.modal-b select,.modal-b textarea{width:100%}
.modal-f{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

.dropdown{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);box-shadow:var(--shadow-lg);padding:4px;z-index:150;min-width:200px;max-height:280px;overflow-y:auto}
.dropdown .item{padding:6px 12px;cursor:pointer;font-size:13px;border-radius:var(--r);display:flex;align-items:center;gap:8px}
.dropdown .item:hover{background:var(--hover)}
.dropdown .item.active{background:var(--blue-dim);color:var(--blue)}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 16px;border-radius:var(--r);font-size:13px;z-index:300;box-shadow:var(--shadow-lg);max-width:400px}
.toast.err{background:var(--red);color:#fff}
.toast.ok{background:var(--green);color:#fff}

.empty-state{display:grid;place-items:center;padding:60px 20px;color:var(--muted);text-align:center}
.empty-state .ico{font-size:40px;margin-bottom:10px;opacity:.5}
.empty-state .ti{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:4px}
.empty-state .bd{font-size:13px;max-width:400px}

@media (max-width:720px){
  .sidebar{position:fixed;left:0;top:44px;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .2s}
  .sidebar.show{transform:translateX(0)}
  .topbar .menu-btn{display:grid !important}
  /* Keep the topbar within the viewport: hide search, shrink names. */
  .topbar{gap:6px;padding:6px 8px;overflow:hidden}
  .topbar .search-wrap{display:none}
  .topbar .ws-pick{max-width:120px;overflow:hidden;white-space:nowrap}
  .topbar .ws-pick span:first-child{overflow:hidden;text-overflow:ellipsis}
  .topbar .user .nm{display:none}
  .topbar .crumb{display:none}
  .workarea{min-width:0;max-width:100vw}
  .det-top h2{font-size:16px;min-width:0}
}
.menu-btn{display:none;width:32px;height:32px;border-radius:var(--r)}
.menu-btn:hover{background:var(--hover)}

</style>
</head>
<body>

<div id="boot" class="center"><div style="color:var(--muted)">Φόρτωση…</div></div>

<div id="auth" class="center hidden">
  <div class="auth">
    <h1>ProMapp · ADO</h1>
    <div class="sub">Συνδεθείτε για να συνεχίσετε</div>
    <div id="auth-form">
      <div class="field"><label>Email</label><input type="email" id="email" autocomplete="email"></div>
      <div class="field"><label>Κωδικός</label><input type="password" id="password" autocomplete="current-password"></div>
      <button class="primary" id="btn-signin">Σύνδεση</button>
      <div class="switch"><a id="link-signup">Δημιουργία λογαριασμού</a> · <a id="link-magic">Αποστολή magic link</a></div>
    </div>
  </div>
</div>

<div class="app" id="app">

// ── Tag color hashing — stable color per tag name ────────────────────
function tagColorClass(name){
  let h = 0;
  for(let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  return 't-' + (Math.abs(h) % 8);
}
function renderTagChip(name, removable=false){
  return `<span class="tag-chip ${tagColorClass(name)}" data-tag="${esc(name)}">${esc(name)}${removable ? '<span class="x" data-rm-tag="'+esc(name)+'">×</span>' : ''}</span>`;
}
function allTags(){

// ── Image upload ─────────────────────────────────────────────────────
const ATTACHMENT_BUCKET = 'work-item-attachments';
const ATTACHMENT_MAX_BYTES = 10 * 1024 * 1024;          // 10 MB
const ATTACHMENT_MIME_OK = ['image/png','image/jpeg','image/gif','image/webp','image/svg+xml'];

async function uploadImage(file){
  if(!file) return null;
  if(!ATTACHMENT_MIME_OK.includes(file.type)){
    throw new Error('Μη υποστηριζόμενος τύπος: ' + file.type);
  }
  if(file.size > ATTACHMENT_MAX_BYTES){
    throw new Error('Πολύ μεγάλο αρχείο (όριο 10MB)');
  }
  // Path: <workspace_id>/<user_id>/<uuid>-<safe-name>
  const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_').slice(-80);
  const path = `${state.currentWsId}/${state.user.id}/${crypto.randomUUID()}-${safe}`;
  const { error } = await sb.storage.from(ATTACHMENT_BUCKET).upload(path, file, {
    cacheControl: '3600',
    upsert: false,
    contentType: file.type,
  });
  if(error) throw error;
  const { data } = sb.storage.from(ATTACHMENT_BUCKET).getPublicUrl(path);
  return data.publicUrl;
}

// Wire a textarea + an optional drop-zone to support image upload.
// Uploads insert `![filename](url)` at the cursor. Status lives in a
// sibling element with class .attach-status (caller provides it).
function wireImageUpload(ta, dropEl, statusEl){
  if(!ta || ta._uploadWired) return;
  ta._uploadWired = true;

  function insertAtCursor(text){
    const start = ta.selectionStart ?? ta.value.length;
    const end   = ta.selectionEnd   ?? ta.value.length;
    ta.value = ta.value.slice(0, start) + text + ta.value.slice(end);
    const newPos = start + text.length;
    ta.setSelectionRange(newPos, newPos);
    ta.focus();
  }

  async function doUpload(file){
    if(statusEl){ statusEl.textContent = 'Μεταφόρτωση…'; statusEl.classList.remove('err'); }
    try{
      const url = await uploadImage(file);
      const alt = file.name.replace(/\.[a-z0-9]+$/i, '');
      insertAtCursor(`\n![${alt}](${url})\n`);
      if(statusEl){ statusEl.textContent = '✓ Μεταφορτώθηκε'; setTimeout(()=>{ if(statusEl) statusEl.textContent = ''; }, 1800); }
    }catch(e){
      if(statusEl){ statusEl.textContent = 'Σφάλμα: ' + (e?.message || e); statusEl.classList.add('err'); }
      else toast('Σφάλμα μεταφόρτωσης: ' + (e?.message || e), 'err');
    }
  }

  // Paste from clipboard
  ta.addEventListener('paste', async (e)=>{
    const items = e.clipboardData?.items || [];
    for(const it of items){
      if(it.kind === 'file'){
        const f = it.getAsFile();
        if(f && f.type.startsWith('image/')){
          e.preventDefault();
          await doUpload(f);
          return;
        }
      }
    }
  });

  // Drag-and-drop into target zone (the textarea or a parent)
  const zone = dropEl || ta;
  ['dragenter','dragover'].forEach(ev => zone.addEventListener(ev, (e)=>{
    if(e.dataTransfer?.types?.includes('Files')){
      e.preventDefault();
      zone.classList.add('drag-zone-on');
    }
  }));
  ['dragleave','drop'].forEach(ev => zone.addEventListener(ev, (e)=>{
    zone.classList.remove('drag-zone-on');
  }));
  zone.addEventListener('drop', async (e)=>{
    if(!e.dataTransfer?.files?.length) return;
    e.preventDefault();
    for(const f of e.dataTransfer.files){
      if(f.type.startsWith('image/')) await doUpload(f);
    }
  });

  // Expose for explicit-button uploads
  ta._doUpload = doUpload;
}


// ── @mention parsing ─────────────────────────────────────────────────
// Names can include spaces. We match against the actual member list,
// longest-name-first so "Mit Giannou" wins over "Mit". Returns array
// of {name, id} for unique mentions.
function parseMentions(body){
  if(!body || !state.members.length) return [];
  const members = [...state.members].sort((a,b) =>
    (b.display_name||'').length - (a.display_name||'').length
  );
  const found = new Map();
  let scratch = body;
  for(const m of members){
    if(!m.display_name) continue;
    // Build regex: @<name> bounded by start/space/punct on both sides
    const escName = m.display_name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`(^|[\\s\\(\\[])@(${escName})(?=$|[\\s.,;:!?\\)\\]])`, 'g');
    if(re.test(scratch)){
      found.set(m.id, { id: m.id, name: m.display_name });
      // Strip so we don't match overlapping shorter names inside it
      scratch = scratch.replace(re, '$1');
    }
  }
  return [...found.values()];
}

// Replace @Name with styled chips, for rendered comments.
function renderMentionsInHtml(html){
  if(!state.members.length) return html;
  const members = [...state.members].sort((a,b) =>
    (b.display_name||'').length - (a.display_name||'').length
  );
  let s = html;
  for(const m of members){
    if(!m.display_name) continue;
    const escName = m.display_name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`@(${escName})\\b`, 'g');
    s = s.replace(re, `<span class="mention">@$1</span>`);
  }
  return s;
}

// Wire @mention autocomplete on a textarea. Detects `@` typed, shows
// a popover of matching members, arrow keys to navigate, Enter/Tab to
// pick, Escape to dismiss.
function wireMentionAutocomplete(ta){
  if(!ta || ta._mentionWired) return;
  ta._mentionWired = true;
  let pop = null;
  let triggerPos = -1;   // position of the '@' in the textarea
  let filtered = [];
  let selIdx = 0;

  function close(){
    if(pop){ pop.remove(); pop = null; }
    triggerPos = -1; filtered = []; selIdx = 0;
  }

  function showPop(query){
    const matches = state.members
      .filter(m => m.display_name && m.display_name.toLowerCase().includes(query.toLowerCase()))
      .slice(0, 8);
    filtered = matches;
    selIdx = 0;
    if(!pop){
      pop = document.createElement('div');
      pop.className = 'mention-pop';
      document.body.appendChild(pop);
    }
    if(!matches.length){
      pop.innerHTML = '<div class="mp-empty">Κανένα μέλος για "' + esc(query) + '"</div>';
    } else {
      pop.innerHTML = matches.map((m, i) => `
        <div class="mp-item ${i===selIdx?'sel':''}" data-i="${i}">
          <div class="mp-av">${esc(initial(m.display_name))}</div>
          <span>${esc(m.display_name)}</span>
        </div>`).join('');
      pop.querySelectorAll('.mp-item').forEach(el => el.onclick = ()=> pick(parseInt(el.dataset.i)));
    }
    // Position under the textarea
    const r = ta.getBoundingClientRect();
    pop.style.left = (r.left + window.scrollX) + 'px';
    pop.style.top  = (r.bottom + window.scrollY + 4) + 'px';
  }

  function pick(i){
    const m = filtered[i];
    if(!m) return;
    const before = ta.value.slice(0, triggerPos);
    const after  = ta.value.slice(ta.selectionStart);
    const insert = '@' + m.display_name + ' ';
    ta.value = before + insert + after;
    const newCursor = (before + insert).length;
    ta.setSelectionRange(newCursor, newCursor);
    ta.focus();
    close();
  }

  function updateSelHighlight(){
    if(!pop) return;
    pop.querySelectorAll('.mp-item').forEach((el, i) => el.classList.toggle('sel', i === selIdx));
  }

  ta.addEventListener('input', ()=>{
    const cur = ta.selectionStart;
    const text = ta.value.slice(0, cur);
    // Find most recent '@' preceded by start-of-line or whitespace
    const m = text.match(/(^|\s)@([^\s@]{0,40})$/);
    if(m){
      triggerPos = cur - m[0].length + m[1].length;  // points to '@'
      showPop(m[2]);
    } else {
      close();
    }
  });

  ta.addEventListener('keydown', (e)=>{
    if(!pop || !filtered.length) return;
    if(e.key === 'ArrowDown'){ e.preventDefault(); selIdx = (selIdx+1) % filtered.length; updateSelHighlight(); }
    else if(e.key === 'ArrowUp'){ e.preventDefault(); selIdx = (selIdx-1+filtered.length) % filtered.length; updateSelHighlight(); }
    else if(e.key === 'Enter' || e.key === 'Tab'){ e.preventDefault(); pick(selIdx); }
    else if(e.key === 'Escape'){ e.preventDefault(); close(); }
  });

  ta.addEventListener('blur', ()=>{
    // Delay so click on popover item still fires
    setTimeout(close, 150);
  });
}

// Local cache of watch state for the currently-open item.
let detailWatching = false;
let detailWatcherCount = 0;

async function loadWatchState(workItemId){
  detailWatching = false;
  detailWatcherCount = 0;
  if(!workItemId) return;
  const { data } = await sb
    .from('work_item_watchers')
    .select('user_id')
    .eq('work_item_id', workItemId);
  const rows = data || [];
  detailWatcherCount = rows.length;
  detailWatching = rows.some(r => r.user_id === state.user.id);
  const btn = document.getElementById('watch-btn');
  if(btn) updateWatchBtn(btn);
}
function updateWatchBtn(btn){
  btn.classList.toggle('watching', detailWatching);
  btn.innerHTML = (detailWatching ? '👁 Παρακολουθείτε' : '👁 Παρακολούθηση') +
    (detailWatcherCount ? ` <span class="watch-count">${detailWatcherCount}</span>` : '');
}
async function ensureWatching(workItemId){
  // Idempotent: add a watch row for the current user if not present.
  const { error } = await sb.from('work_item_watchers')
    .upsert({ work_item_id: workItemId, user_id: state.user.id }, { onConflict: 'work_item_id,user_id', ignoreDuplicates: true });
  if(error) console.warn('ensureWatching failed:', error);
}
async function toggleWatch(workItemId){
  if(detailWatching){
    const { error } = await sb.from('work_item_watchers')
      .delete().eq('work_item_id', workItemId).eq('user_id', state.user.id);
    if(error){ toast(friendlyError(error),'err'); return; }
    detailWatching = false;
    detailWatcherCount = Math.max(0, detailWatcherCount - 1);
    toast('Σταματήσατε την παρακολούθηση', 'ok');
  } else {
    const { error } = await sb.from('work_item_watchers')
      .insert({ work_item_id: workItemId, user_id: state.user.id });
    if(error){ toast(friendlyError(error),'err'); return; }
    detailWatching = true;
    detailWatcherCount += 1;
    toast('Παρακολουθείτε αυτή την εργασία', 'ok');
  }
  const btn = document.getElementById('watch-btn');
  if(btn) updateWatchBtn(btn);
}

async function loadNotifications(){
  if(!state.user) return;
  // Server-side filter by workspace_id (denormalized) — correct and fast.
  // Fetch unread + a small tail of read for the "recent" history section.
  const { data, error } = await sb
    .from('notifications')
    .select('id, kind, detail, work_item_id, comment_id, created_at, read_at, actor_id, work_items:work_item_id(display_id, title, project_id, projects:project_id(name, workspace_id)), comment:comment_id(body), actor:actor_id(display_name)')
    .eq('recipient_id', state.user.id)
    .eq('workspace_id', state.currentWsId)
    .order('created_at', { ascending: false })
    .limit(60);
  if(error){ console.warn('Notifications load failed:', error); return; }
  const all = data || [];
  state.notifications = all.filter(n => !n.read_at);
  state.notificationsRead = all.filter(n => n.read_at).slice(0, 5);

  // Count unread in OTHER workspaces (cheap head-count query).
  const { count } = await sb
    .from('notifications')
    .select('id', { count: 'exact', head: true })
    .eq('recipient_id', state.user.id)
    .neq('workspace_id', state.currentWsId)
    .is('read_at', null);
  state.notificationsOtherWs = count || 0;

  renderBellBadge();
}

function renderBellBadge(){
  const n = state.notifications.length;
  const bell = $('bell-btn');
  const cnt = $('bell-count');
  if(!bell || !cnt) return;
  if(n > 0){
    bell.classList.add('has-unread');
    cnt.classList.remove('hidden');
    cnt.textContent = n > 99 ? '99+' : String(n);
  } else {
    bell.classList.remove('has-unread');
    cnt.classList.add('hidden');
  }
  // Hint that other workspaces have unread notifications, even when this
  // workspace is clear.
  bell.classList.toggle('other-ws-unread', n === 0 && state.notificationsOtherWs > 0);
}

// Compose the headline for one notification by kind
function notifLine(n){
  const who = esc(n.actor?.display_name || 'Κάποιος');
  switch(n.kind){
    case 'mention':  return `<strong>${who}</strong> σας ανέφερε`;
    case 'state':    return `<strong>${who}</strong> άλλαξε κατάσταση`;
    case 'assignee': return `<strong>${who}</strong> άλλαξε υπεύθυνο`;
    case 'comment':  return `<strong>${who}</strong> σχολίασε`;
    default:         return `<strong>${who}</strong>`;
  }
}
function notifIcon(kind){
  return kind === 'mention' ? '@' : kind === 'comment' ? '💬' : kind === 'state' ? '◔' : '👤';
}

function notifItemHtml(n, isRead){
  const wi = n.work_items;
  const proj = wi?.projects;
  const snippet = n.kind === 'mention' || n.kind === 'comment'
    ? (n.comment?.body || '').slice(0, 140)
    : (n.detail || '');
  const more = (n.comment?.body || '').length > 140 ? '…' : '';
  return `<div class="inbox-item ${isRead?'is-read':''}" data-nid="${esc(n.id)}" data-wid="${esc(n.work_item_id)}">
    <div class="head">
      <span class="notif-ico">${notifIcon(n.kind)}</span>
      ${notifLine(n)}
      <span class="id">#${wi?.display_id || '—'}</span>
      ${proj ? `<span style="color:var(--muted)">${esc(proj.name)}</span>` : ''}
    </div>
    <div class="body">${esc(wi?.title || '')}</div>
    ${snippet ? `<div class="body" style="color:var(--muted);font-style:italic;margin-top:3px">${n.kind==='state'||n.kind==='assignee' ? esc(snippet) : '"'+esc(snippet)+more+'"'}</div>` : ''}
    <div class="ts">${esc(fmtTime(n.created_at))}</div>
  </div>`;
}

function openInbox(){
  const existing = document.getElementById('inbox-panel');
  if(existing){ existing.remove(); return; }
  const unread = state.notifications;
  const readHist = state.notificationsRead || [];
  const panel = document.createElement('div');
  panel.id = 'inbox-panel';
  panel.className = 'inbox-panel';

  const otherHint = state.notificationsOtherWs > 0
    ? `<div class="inbox-otherws">+${state.notificationsOtherWs} σε άλλους χώρους εργασίας</div>`
    : '';

  let body;
  if(!unread.length && !readHist.length){
    body = '<div class="inbox-empty">Καμία ειδοποίηση 🎉</div>' + otherHint;
  } else {
    body =
      (unread.length ? unread.map(n => notifItemHtml(n, false)).join('') : '<div class="inbox-empty" style="padding:14px">Καμία νέα ειδοποίηση 🎉</div>') +
      otherHint +
      (readHist.length ? `<div class="inbox-section">Πρόσφατα</div>` + readHist.map(n => notifItemHtml(n, true)).join('') : '');
  }

  panel.innerHTML = `
    <div class="inbox-h">
      <h3>Ειδοποιήσεις</h3>
      ${unread.length ? '<button class="btn ghost sm" id="inbox-mark-all">Σήμανση όλων</button>' : ''}
    </div>
    ${body}
  `;
  document.body.appendChild(panel);

  // Navigate to an item (used by both unread and read rows).
  async function goToItem(wid){
    panel.remove();
    let pid = state.workItems.find(w => w.id === wid)?.project_id;
    if(!pid){
      const { data } = await sb.from('work_items').select('project_id').eq('id', wid).maybeSingle();
      pid = data?.project_id;
    }
    if(pid && pid !== state.currentProjectId){
      await selectProject(pid);
    }
    openDetail(wid);
  }

  panel.querySelectorAll('.inbox-item').forEach(it => it.onclick = async ()=>{
    const nid = it.dataset.nid;
    const wid = it.dataset.wid;
    const wasUnread = !it.classList.contains('is-read');
    if(wasUnread){
      const { error } = await sb.from('notifications').update({ read_at: new Date().toISOString() }).eq('id', nid);
      if(error){ toast(friendlyError(error),'err'); return; }
      state.notifications = state.notifications.filter(n => String(n.id) !== String(nid));
      renderBellBadge();
    }
    await goToItem(wid);
  });

  const ma = $('inbox-mark-all');
  if(ma) ma.onclick = async (e)=>{
    e.stopPropagation();
    const ids = state.notifications.map(n => n.id);
    if(!ids.length) return;
    const { error } = await sb.from('notifications').update({ read_at: new Date().toISOString() }).in('id', ids);
    if(error){ toast(friendlyError(error),'err'); return; }
    state.notifications = [];
    renderBellBadge();
    panel.remove();
    loadNotifications();  // refresh read-history to include the just-read ones
  };

  setTimeout(()=>{
    const off = (e)=>{
      if(!panel.contains(e.target) && !e.target.closest('#bell-btn')){
        panel.remove();
        document.removeEventListener('click', off);
      }
    };
    document.addEventListener('click', off);
  }, 0);
}


// Render the editor for one custom field. Returns HTML; the caller
// must wire change/blur handlers via wireCustomFieldEditors() afterwards.
function renderCustomFieldEditor(w, f){
  const v = (w.custom_fields && w.custom_fields[f.key]) ?? '';
  const inputId = 'cf-' + f.key;
  let editor;
  if(f.kind === 'textarea'){
    if(f.md){
      // Read-only markdown rendering with click-to-edit
      editor = `<div class="cf-md md-body ${v?'':'empty'}" data-key="${esc(f.key)}" id="${inputId}">${v ? renderMarkdown(v) : 'Click to add…'}</div>`;
    } else {
      editor = `<textarea id="${inputId}" data-key="${esc(f.key)}" rows="3">${esc(v)}</textarea>`;
    }
  } else if(f.kind === 'select'){
    editor = `<select id="${inputId}" data-key="${esc(f.key)}">
      ${f.options.map(o => `<option value="${esc(o)}" ${o===v?'selected':''}>${esc(o || '— None —')}</option>`).join('')}
    </select>`;
  } else if(f.kind === 'date'){
    editor = `<input type="date" id="${inputId}" data-key="${esc(f.key)}" value="${esc(v)}">`;
  } else {
    editor = `<input type="text" id="${inputId}" data-key="${esc(f.key)}" value="${esc(v)}">`;
  }
  return `<div class="det-field">
    <label>${esc(f.label)}</label>
    ${editor}
    ${f.hint ? `<div class="md-hint">${esc(f.hint)}</div>` : ''}
  </div>`;
}

// Wire up custom-field editors on the detail page. Saves to
// work_items.custom_fields (JSONB) — merge, don't overwrite.
function wireCustomFieldEditors(id, w){
  const fields = customFieldsFor(w.type);
  for(const f of fields){
    const el = $('cf-' + f.key);
    if(!el) continue;
    if(f.kind === 'textarea' && f.md){
      // Click-to-edit markdown
      el.onclick = ()=>{
        const orig = (w.custom_fields && w.custom_fields[f.key]) || '';
        const wrap = document.createElement('div');
        const ta = document.createElement('textarea');
        ta.className = 'det-desc-edit';
        ta.style.minHeight = '100px';
        ta.value = orig;
        const hint = document.createElement('div');
        hint.className = 'md-hint';
        hint.textContent = (f.hint || '') + ' Υποστηρίζεται markdown.';
        wrap.appendChild(ta);
        wrap.appendChild(hint);
        el.replaceWith(wrap);
        ta.focus();
        let saving = false;
        ta.onblur = async ()=>{
          if(saving) return;
          saving = true;
          const newVal = ta.value.trim();
          if(newVal !== orig){
            await saveCustomField(id, w, f.key, newVal);
          }
          renderDetail();
        };
      };
    } else if(f.kind === 'select') {
      el.onchange = ()=> saveCustomField(id, w, f.key, el.value || null);
    } else {
      el.onblur = ()=> saveCustomField(id, w, f.key, el.value || null);
    }
  }
}

async function saveCustomField(id, w, key, value){
  const cur = w.custom_fields || {};
  const next = { ...cur };
  if(value === null || value === '' || value === undefined){
    delete next[key];
  } else {
    next[key] = value;
  }
  const ok = await updateWorkItem(id, { custom_fields: next });
  if(ok){ w.custom_fields = next; }
}

// ── Minimal markdown renderer + sanitizer ──────────────────────────────
// Supports: headings (#, ##, ###), bold (**x**), italic (*x*), inline
// code (`x`), code blocks (```), bullet/numbered lists, links [t](url),
// blockquotes (>), and paragraph breaks. Everything is escaped first
// then we re-introduce a fixed, safe set of tags. Links: only http(s)/
// mailto allowed.
function renderMarkdown(src){
  if(!src) return '';
  // 1) Escape HTML
  let s = String(src).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  // 2) Code blocks (fence ```)
  const codeBlocks = [];
  s = s.replace(/```([\s\S]*?)```/g, (_, code)=>{
    codeBlocks.push(code);
    return `\x00CODEBLOCK${codeBlocks.length-1}\x00`;
  });
  // 3) Inline code
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // 4) Headings
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  // 5) Bold / italic
  s = s.replace(/\*\*([^\*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(?<!\*)\*([^\*\n]+)\*(?!\*)/g, '<em>$1</em>');
  // 6a) Images — http(s) only; rendered as inline thumbnail with click-to-zoom
  s = s.replace(/!\[([^\]]*)\]\((https?:\/\/[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener noreferrer"><img src="$2" alt="$1" class="md-img" loading="lazy"></a>');
  // 6b) Links — http(s) and mailto only
  s = s.replace(/\[([^\]]+)\]\(((?:https?:\/\/|mailto:)[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  // 7) Blockquotes
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // 8) Lists — group consecutive list items
  // Bullet
  s = s.replace(/(?:^- (.+)(?:\n|$))+/gm, m => {
    const items = m.trim().split(/\n/).map(l => '<li>' + l.replace(/^- /, '') + '</li>').join('');
    return '<ul>' + items + '</ul>';
  });
  // Numbered
  s = s.replace(/(?:^\d+\. (.+)(?:\n|$))+/gm, m => {
    const items = m.trim().split(/\n/).map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>').join('');
    return '<ol>' + items + '</ol>';
  });
  // 9) Paragraphs — split on blank lines, wrap non-block lines in <p>
  s = s.split(/\n{2,}/).map(block => {
    block = block.trim();
    if(!block) return '';
    if(/^<(h[1-3]|ul|ol|blockquote|pre)/.test(block)) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  // 10) Restore code blocks
  s = s.replace(/\x00CODEBLOCK(\d+)\x00/g, (_, i)=> {
    return '<pre><code>' + codeBlocks[parseInt(i)] + '</code></pre>';
  });
  return s;
}
const show = id => $(id).classList.remove('hidden');
const hide = id => $(id).classList.add('hidden');

function toast(msg, kind=''){
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  el.textContent = msg;
  $('toast-root').appendChild(el);
  setTimeout(()=> el.remove(), 3200);
}

function friendlyError(e){
  if(!e) return 'Άγνωστο σφάλμα';
  const m = e.message || e.error_description || JSON.stringify(e);
  if(e.code === '42501') return 'Δεν επιτρέπεται (RLS)';
  if(e.code === '23505') return 'Υπάρχει ήδη';
  if(e.code === '23503') return 'Δεν βρέθηκε συνδεδεμένη εγγραφή';
  return m;
}

function fmtTime(iso){
  if(!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if(diff < 60) return 'μόλις τώρα';
  if(diff < 3600) return Math.floor(diff/60) + 'λ πριν';
  if(diff < 86400) return Math.floor(diff/3600) + 'ώ πριν';
  if(diff < 604800) return Math.floor(diff/86400) + 'η πριν';
  return d.toLocaleDateString('el-GR');
}

// supabase-js fires SIGNED_IN whenever it restores a session (every page
// load) as well as on actual login. We track whether boot has finished
// and only act on events from THAT point on. Even then, we don't reload
// the page — we just re-enter the app with the new user if relevant.
let bootDone = false;
let entering = false;
sb.auth.onAuthStateChange((event, session)=>{
  if(!bootDone) return;
  if(event === 'SIGNED_OUT'){
    location.reload();
    return;
  }
  // SIGNED_IN / TOKEN_REFRESHED / USER_UPDATED — if we're not already
  // showing the app for this user, enter it.
  if(session?.user && (!state.user || state.user.id !== session.user.id)){
    enterApp(session.user);
  }
});

async function ensureProfile(user){
  const { data: existing } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
  if(existing) return existing;
  const display_name = user.user_metadata?.display_name || (user.email||'').split('@')[0] || 'User';
  const { data: ins } = await sb.from('profiles').insert({ id: user.id, display_name, email: user.email }).select().single();
  return ins;
}

async function loadWorkspaces(){
  const { data, error } = await sb
    .from('workspace_members')
    .select('workspace_id, role, workspaces:workspace_id(id, name, owner_id)')
    .eq('user_id', state.user.id);
  if(error){ toast('Χώροι εργασίας: '+friendlyError(error),'err'); return; }
  state.memberships = (data||[]).filter(m => m.workspaces);
  if(state.memberships.length){
    // Pick saved or first
    const saved = localStorage.getItem('pm-ado:ws');
    const initial = state.memberships.find(m => m.workspaces.id === saved)?.workspaces.id
                 || state.memberships[0].workspaces.id;
    await setActiveWorkspace(initial);
  }
}

async function setActiveWorkspace(wsId){
  const m = state.memberships.find(x => x.workspaces.id === wsId);
  if(!m) return;
  state.currentWsId = wsId;
  state.currentRole = m.role;
  try{ localStorage.setItem('pm-ado:ws', wsId); }catch{}
  $('ws-pick-name').textContent = m.workspaces.name;
  $('crumb-ws').textContent = m.workspaces.name;
  state.currentProjectId = null;
  state.projects = [];
  state.workItems = [];
  unsubAll();
  loadBacklogColumns();
  await Promise.all([ loadProjects(), loadMembers(), loadIterations(), loadNotifications() ]);
  await restoreLastView();
}

// On boot: decide the initial view. URL hash wins (refresh/deep link),
// else the landing-page preference, else overview.
async function restoreLastView(){
  const fromHash = parseHash();
  if(fromHash){ await applyRoute(fromHash); return; }

  const landing = localStorage.getItem('pm-ado:landing') || 'restore';
  if(landing && landing !== 'restore'){
    if(['board','backlog'].includes(landing) && state.projects.length){
      await applyRoute({ page: landing, projectId: state.projects[0].id });
    } else {
      await applyRoute({ page: landing });
    }
    return;
  }
  goPage('overview');
}

async function loadIterations(){
  if(!state.currentWsId){ state.iterations = []; return; }
  const { data, error } = await sb
    .from('iterations')
    .select('id, name, start_date, end_date, created_at')
    .eq('workspace_id', state.currentWsId)
    .order('start_date', { ascending: true, nullsFirst: true });
  if(error){ toast('Περίοδοι: '+friendlyError(error),'err'); return; }
  state.iterations = data || [];
}

// Pick the "current" iteration: one where today is between start/end,
// or the most recent if none active, or the first one otherwise.
function currentIteration(){
  if(!state.iterations.length) return null;
  const today = new Date().toISOString().slice(0,10);
  const active = state.iterations.find(i =>
    i.start_date && i.end_date && i.start_date <= today && today <= i.end_date
  );
  if(active) return active;
  // Future or null-dated: pick first; otherwise most recent past
  const sorted = [...state.iterations].sort((a,b) => (b.start_date||'').localeCompare(a.start_date||''));
  return sorted[0] || null;
}

// ── Completion metrics ───────────────────────────────────────────────
// Spec: leaf items only (story/task/bug); done = closed OR resolved.
// Headline = done leaves ÷ total leaves (by count).
// Secondary (points) = done points ÷ total points, only when at least half
// the leaves carry a point value and total points > 0.
const LEAF_TYPES = ['story','task','bug'];
const DONE_STATES = ['closed','resolved'];
function computeCompletion(items){
  const leaves = (items || []).filter(w => LEAF_TYPES.includes(w.type));
  const total = leaves.length;
  const done = leaves.filter(w => DONE_STATES.includes(w.state)).length;
  const countPct = total ? Math.round((done / total) * 100) : null;

  const withPts = leaves.filter(w => typeof w.story_points === 'number' && w.story_points > 0);
  const totalPts = withPts.reduce((s,w) => s + w.story_points, 0);
  const donePts = withPts.filter(w => DONE_STATES.includes(w.state)).reduce((s,w) => s + w.story_points, 0);
  // Only trust points if enough leaves have them.
  const ptsReliable = total > 0 && withPts.length / total >= 0.5 && totalPts > 0;
  const pointsPct = ptsReliable ? Math.round((donePts / totalPts) * 100) : null;

  return { total, done, countPct, pointsPct, totalPts, donePts };
}
// Small inline progress bar markup.
function completionBar(pct){
  const v = pct == null ? 0 : pct;
  return `<div class="cbar"><div class="cbar-fill" style="width:${v}%"></div></div>`;
}

async function loadWorkItems(){
  if(!state.currentProjectId){ state.workItems = []; return; }
  const { data, error } = await sb
    .from('work_items')
    .select('id, project_id, workspace_id, parent_id, type, title, description, state, priority, story_points, initial_estimate, remaining_work, assignee_id, area, iteration, iteration_id, tags, display_id, created_by, created_at, updated_at, position, custom_fields, assignee:assignee_id(id, display_name)')
    .eq('project_id', state.currentProjectId)
    .order('position', { ascending: true, nullsFirst: false });
  if(error){ toast('Εργασίες: '+friendlyError(error),'err'); return; }
  state.workItems = data || [];
}

function childrenOf(parentId){
  return state.workItems.filter(w => w.parent_id === parentId);
}
function itemById(id){
  return state.workItems.find(w => w.id === id);
}

async function createWorkItem(payload){
  payload.id = crypto.randomUUID();
  payload.workspace_id = state.currentWsId;
  payload.project_id = state.currentProjectId;
  payload.created_by = state.user.id;
  // Default position: append to end of same-state/same-parent group
  if(payload.position == null){
    const siblings = state.workItems.filter(w =>
      w.parent_id === (payload.parent_id || null) &&
      (payload.state ? w.state === payload.state : true)
    );
    const maxPos = siblings.reduce((m, w) => Math.max(m, w.position || 0), 0);
    payload.position = maxPos + 1000;
  }
  const { error } = await sb.from('work_items').insert(payload);
  if(error){ toast(friendlyError(error),'err'); return null; }
  // Creator auto-watches their new item
  ensureWatching(payload.id);
  await loadWorkItems();
  return payload.id;
}

// Clone a work item (not its children). Copies content fields, resets
// identity/audit fields, appends " (αντίγραφο)" to the title.
async function duplicateWorkItem(id){
  const src = itemById(id);
  if(!src){ toast('Δεν βρέθηκε η εργασία','err'); return null; }
  const payload = {
    parent_id: src.parent_id || null,
    type: src.type,
    title: (src.title || '') + ' (αντίγραφο)',
    description: src.description || '',
    state: src.state,
    priority: src.priority,
    story_points: src.story_points,
    initial_estimate: src.initial_estimate,
    remaining_work: src.remaining_work,
    assignee_id: src.assignee_id || null,
    area: src.area || null,
    iteration_id: src.iteration_id || null,
    tags: Array.isArray(src.tags) ? [...src.tags] : [],
    custom_fields: src.custom_fields ? JSON.parse(JSON.stringify(src.custom_fields)) : null,
  };
  const newId = await createWorkItem(payload);
  if(newId){ toast('Δημιουργήθηκε αντίγραφο','ok'); }
  return newId;
}

async function updateWorkItem(id, patch){
  const { error } = await sb.from('work_items').update(patch).eq('id', id);
  if(error){ toast(friendlyError(error),'err'); return false; }
  // Optimistic local update
  const it = itemById(id);
  if(it) Object.assign(it, patch);
  return true;
}

async function deleteWorkItem(id){
  if(!confirm('Διαγραφή εργασίας; Οι υποεργασίες θα παραμείνουν αλλά θα χάσουν τη σύνδεση με αυτήν.')) return;
  const { error } = await sb.from('work_items').delete().eq('id', id);
  if(error){ toast(friendlyError(error),'err'); return; }
  toast('Διαγράφηκε','ok');
  await loadWorkItems();
  if(state.currentPage === 'detail' && state.currentItemId === id){

  } else {
    rerenderCurrent();
  }
}

function unsubAll(){
  for(const k of Object.keys(state.channels)){
    if(k === 'mentions') continue;  // user-scoped, persists across project switches
    if(state.channels[k]){ sb.removeChannel(state.channels[k]); state.channels[k] = null; }
  }
}

// User-scoped subscription that follows them across workspaces.
// Called once after first workspace load.
function subscribeUserMentions(){
  if(state.channels.mentions) return;
  state.channels.mentions = sb.channel('notif-'+state.user.id)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'notifications',
      filter: `recipient_id=eq.${state.user.id}`,
    }, ()=> loadNotifications())
    .subscribe();
}

function subscribeRealtime(){
  if(!state.currentProjectId) return;
  unsubAll();
  const pid = state.currentProjectId;
  state.channels.wi = sb.channel('wi-'+pid)
    .on('postgres_changes', { event:'*', schema:'public', table:'work_items', filter:`project_id=eq.${pid}` },
      async ()=>{
        await loadWorkItems();
        rerenderCurrent();
        if(state.currentPage === 'detail') loadDetailActivity();
      })
    .subscribe();
  state.channels.wic = sb.channel('wic-'+pid)
    .on('postgres_changes', { event:'*', schema:'public', table:'work_item_comments' },
      ()=>{ if(state.currentPage === 'detail') loadDetailComments(); })
    .subscribe();
  state.channels.it = sb.channel('it-'+state.currentWsId)
    .on('postgres_changes', { event:'*', schema:'public', table:'iterations', filter:`workspace_id=eq.${state.currentWsId}` },
      async ()=>{ await loadIterations(); if(state.currentPage==='sprints') renderSprintsPage(); })
    .subscribe();
}

// ════════════════════════════════════════════════════════════════════
// PAGE ROUTING
// ════════════════════════════════════════════════════════════════════
$('nav-overview').onclick = ()=> goPage('overview');
$('nav-projects').onclick = ()=> goPage('projects');
$('nav-board').onclick    = ()=> goPage('board');
$('nav-backlog').onclick  = ()=> goPage('backlog');
$('nav-sprints').onclick  = ()=> goPage('sprints');
$('nav-members').onclick  = ()=> goPage('members');
$('nav-settings').onclick = ()=> goPage('settings');
$('menu-btn').onclick     = ()=> $('sidebar').classList.toggle('show');

// When true, we're applying state FROM the URL, so goPage must not push a
// new history entry (avoids loops on popstate/refresh).
let navApplyingFromUrl = false;

function buildHash(name){
  if(name === 'detail' && state.currentItemId) return `#detail/${state.currentItemId}`;
  if(name === 'projectdetail' && state.viewProjectId) return `#projectdetail/${state.viewProjectId}`;
  if(['board','backlog'].includes(name) && state.currentProjectId) return `#${name}/${state.currentProjectId}`;
  return `#${name}`;
}

function goPage(name){
  state.currentPage = name;
  // Reflect the view in the URL so refresh + browser/phone back work.
  if(!navApplyingFromUrl){
    const h = buildHash(name);
    if(location.hash !== h){
      try{ history.pushState({ page:name }, '', h); }catch{}
    }
  }
  ['overview','projects','projectdetail','board','backlog','sprints','detail','members','settings'].forEach(p =>
    $('page-'+p).classList.toggle('hidden', p !== name)
  );
  ['overview','projects','board','backlog','sprints','members','settings'].forEach(p => {
    const btn = $('nav-'+p);
    if(btn) btn.classList.toggle('active', p === name);
  });
  // Project detail is reached from the Projects list, so keep Έργα highlighted.
  if(name === 'projectdetail'){ const b = $('nav-projects'); if(b) b.classList.add('active'); }
  $('sidebar').classList.remove('show');
  const ti = $('sub-title'), tabs = $('sub-tabs'), acts = $('sub-actions');
  tabs.innerHTML = ''; acts.innerHTML = '';
  if(name === 'overview'){ ti.textContent = 'Επισκόπηση'; $('crumb-page').textContent = 'Επισκόπηση'; renderOverview(); }
  else if(name === 'projects'){ ti.textContent = 'Έργα'; $('crumb-page').textContent = 'Έργα'; renderProjectsPage(); }
  else if(name === 'projectdetail'){ ti.textContent = ''; $('crumb-page').textContent = 'Έργο'; renderProjectDetail(); }
  else if(name === 'board'){ ti.textContent = state.currentProjectId ? (state.projects.find(p=>p.id===state.currentProjectId)?.name || '') : 'Ροή εργασιών'; $('crumb-page').textContent = 'Ροή εργασιών'; renderBoardHeader(); renderBoard(); }
  else if(name === 'backlog'){ ti.textContent = state.currentProjectId ? (state.projects.find(p=>p.id===state.currentProjectId)?.name || '') : 'Λίστα εργασιών'; $('crumb-page').textContent = 'Λίστα εργασιών'; renderBacklog(); }
  else if(name === 'sprints'){ ti.textContent = 'Περίοδοι'; $('crumb-page').textContent = 'Περίοδοι'; renderSprintsPage(); }
  else if(name === 'detail'){ ti.textContent = ''; $('crumb-page').textContent = 'Εργασία'; renderDetail(); }
  else if(name === 'members'){ ti.textContent = 'Ομάδα'; $('crumb-page').textContent = 'Ομάδα'; renderMembers(); }
  else if(name === 'settings'){ ti.textContent = 'Ρυθμίσεις'; $('crumb-page').textContent = 'Ρυθμίσεις'; renderSettings(); }
}

// Parse the current URL hash → {page, projectId, itemId}
function parseHash(){
  const h = (location.hash || '').replace(/^#/, '');
  if(!h) return null;
  const [page, arg] = h.split('/');
  const valid = ['overview','projects','projectdetail','board','backlog','sprints','detail','members','settings'];
  if(!valid.includes(page)) return null;
  return {
    page,
    projectId: (['board','backlog','projectdetail'].includes(page)) ? (arg || null) : null,
    itemId: page === 'detail' ? (arg || null) : null,
  };
}

// Apply a parsed view (from hash) without pushing new history.
async function applyRoute(view){
  navApplyingFromUrl = true;
  try{
    if(!view){ goPage('overview'); return; }

    // detail: need the item's project loaded for parent/child links
    if(view.page === 'detail' && view.itemId){
      let pid = state.workItems.find(w => w.id === view.itemId)?.project_id;
      if(!pid){
        const { data } = await sb.from('work_items').select('id, project_id').eq('id', view.itemId).maybeSingle();
        if(!data){ goPage('overview'); return; }
        pid = data.project_id;
      }
      if(pid && pid !== state.currentProjectId && state.projects.some(p=>p.id===pid)){
        state.currentPage = 'detail';
        await selectProjectQuiet(pid);
      }
      state.currentItemId = view.itemId;
      goPage('detail');
      return;
    }

    // project detail page (shows one project's info)
    if(view.page === 'projectdetail' && view.projectId){
      if(!state.projects.some(p => p.id === view.projectId)){ goPage('projects'); return; }
      state.viewProjectId = view.projectId;
      goPage('projectdetail');
      return;
    }

    // project-scoped pages
    if(['board','backlog'].includes(view.page)){
      const projOk = view.projectId && state.projects.some(p => p.id === view.projectId);
      if(projOk && view.projectId !== state.currentProjectId){
        state.currentPage = view.page;
        await selectProjectQuiet(view.projectId);
      } else if(!projOk && !state.currentProjectId && state.projects.length){
        await selectProjectQuiet(state.projects[0].id);
      }
      goPage(view.page);
      return;
    }

    // workspace-scoped pages
    goPage(view.page);
  } finally {
    navApplyingFromUrl = false;
  }
}
