<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProMapp · Work Items</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════════
   ProMapp ADO — visual language inspired by Azure DevOps:
   light + neutral by default with dark mode option. Tight, dense, work-
   first. Blue accents, type icons, monospace IDs.
   ═══════════════════════════════════════════════════════════════════ */

:root{
  /* light theme defaults */
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface2: #fafafa;
  --hover: #f2f2f2;
  --border: #e1e1e1;
  --border2: #d0d0d0;
  --text: #1f1f1f;
  --text2: #4a4a4a;
  --muted: #767676;
  --blue: #0078d4;
  --blue-h: #106ebe;
  --blue-dim: #deecf9;
  --red: #d13438;
  --red-dim: #fde7e9;
  --orange: #d83b01;
  --orange-dim: #fed9cc;
  --green: #107c10;
  --green-dim: #dff6dd;
  --purple: #5c2d91;
  --purple-dim: #e8e0f0;
  --yellow: #ffaa44;
  --yellow-dim: #fff4ce;
  --shadow: 0 1.6px 3.6px rgba(0,0,0,.13), 0 .3px .9px rgba(0,0,0,.10);
  --shadow-lg: 0 6.4px 14.4px rgba(0,0,0,.13), 0 1.2px 3.6px rgba(0,0,0,.10);
  --r: 4px;
  --rm: 6px;
  --hd: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}
[data-theme=dark]{
  --bg: #1b1b1b;
  --surface: #252525;
  --surface2: #2d2d2d;
  --hover: #333;
  --border: #3a3a3a;
  --border2: #4a4a4a;
  --text: #f3f3f3;
  --text2: #cccccc;
  --muted: #999;
  --blue: #58a6ff;
  --blue-h: #79b8ff;
  --blue-dim: #1a3a5c;
  --red: #f87171;
  --red-dim: #4a1f1f;
  --orange: #ff8c5a;
  --orange-dim: #4a2a1a;
  --green: #4ade80;
  --green-dim: #1a3a1f;
  --purple: #a78bfa;
  --purple-dim: #2a1a4a;
  --yellow: #fbbf24;
  --yellow-dim: #3a2a0a;
  --shadow: 0 1.6px 3.6px rgba(0,0,0,.45), 0 .3px .9px rgba(0,0,0,.3);
  --shadow-lg: 0 6.4px 14.4px rgba(0,0,0,.45), 0 1.2px 3.6px rgba(0,0,0,.3);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--hd);font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;font-size:inherit;border:none;background:transparent;color:inherit}
button:disabled{cursor:not-allowed;opacity:.5}
input,select,textarea{font-family:inherit;font-size:inherit;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
textarea{resize:vertical;min-height:60px;font-family:var(--hd)}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* ─── BOOT/AUTH ─── */
.center{display:grid;place-items:center;min-height:100vh;padding:20px}
.auth{background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);padding:28px;max-width:380px;width:100%;box-shadow:var(--shadow)}
.auth h1{font-size:22px;font-weight:600;margin-bottom:4px;letter-spacing:-.01em}
.auth .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
.auth .field{margin-bottom:12px}
.auth label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.auth input{width:100%}
.auth button.primary{width:100%;background:var(--blue);color:#fff;padding:8px;border-radius:var(--r);font-weight:600;margin-top:8px}
.auth button.primary:hover{background:var(--blue-h)}
.auth .switch{margin-top:14px;text-align:center;font-size:13px;color:var(--muted)}
.auth .switch a{cursor:pointer}

/* ─── APP SHELL ─── */
.app{display:none;height:100vh;flex-direction:column}
.app.show{display:flex}
.topbar{display:flex;align-items:center;gap:10px;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);min-height:44px;flex-shrink:0}
.topbar .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:var(--text)}
.topbar .logo .mark{width:24px;height:24px;background:var(--blue);color:#fff;border-radius:var(--r);display:grid;place-items:center;font-weight:700;font-size:13px}
.topbar .crumb{color:var(--muted);font-size:13px}
.topbar .crumb span{color:var(--text2);font-weight:500}
.topbar .crumb .sep{margin:0 6px;color:var(--border2)}
.topbar .spacer{flex:1}
.topbar .ws-pick{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px 10px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px}
.topbar .ws-pick:hover{background:var(--hover)}
.topbar .iconbtn{width:32px;height:32px;border-radius:var(--r);display:grid;place-items:center;color:var(--text2)}
.topbar .iconbtn:hover{background:var(--hover);color:var(--text)}
.topbar .user{display:flex;align-items:center;gap:6px;padding:2px 8px 2px 4px;border-radius:999px;background:var(--surface2);border:1px solid var(--border)}
.topbar .user .av{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:600}
.topbar .user .nm{font-size:12px;font-weight:500}

/* ─── MAIN LAYOUT ─── */
.main{flex:1;display:flex;min-height:0;overflow:hidden}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-project{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-project .icon{width:28px;height:28px;border-radius:var(--r);background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px}
.sb-project .nm{font-weight:600;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-project .add{width:24px;height:24px;border-radius:var(--r);display:grid;place-items:center;color:var(--muted)}
.sb-project .add:hover{background:var(--hover);color:var(--text)}

.sb-nav{padding:6px 0;flex:1}
.sb-nav button{display:flex;align-items:center;gap:10px;width:100%;padding:7px 14px;text-align:left;color:var(--text2);font-size:13px;font-weight:500;border-left:2px solid transparent}
.sb-nav button:hover{background:var(--hover);color:var(--text)}
.sb-nav button.active{background:var(--blue-dim);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.sb-nav button .ico{font-size:14px;width:18px;display:inline-block;text-align:center}
.sb-nav .group{padding:10px 14px 4px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}

.sb-projects-list{padding:0 0 6px;border-top:1px solid var(--border);max-height:40vh;overflow-y:auto}
.sb-projects-list .pi{display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--text2)}
.sb-projects-list .pi:hover{background:var(--hover);color:var(--text)}
.sb-projects-list .pi.active{background:var(--blue-dim);color:var(--blue);font-weight:600}
.sb-projects-list .pi .hash{color:var(--muted);font-family:var(--mono);font-size:11px}
.sb-projects-list .empty{padding:12px 14px;color:var(--muted);font-style:italic;font-size:12px}

.workarea{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.subtopbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.subtopbar h1{font-size:18px;font-weight:600;color:var(--text)}
.subtopbar .tabs{display:flex;gap:0;margin-left:14px}
.subtopbar .tab{padding:6px 14px;border-bottom:2px solid transparent;color:var(--text2);font-weight:500;font-size:13px;cursor:pointer}
.subtopbar .tab:hover{color:var(--text)}
.subtopbar .tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.subtopbar .spacer{flex:1}
.subtopbar .actions{display:flex;gap:6px;align-items:center}

.btn{padding:5px 12px;border-radius:var(--r);background:var(--blue);color:#fff;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--blue-h)}
.btn.ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn.ghost:hover{background:var(--hover);color:var(--text)}
.btn.danger{background:var(--red);color:#fff}
.btn.sm{padding:3px 8px;font-size:12px}

.page{flex:1;overflow:auto;background:var(--bg)}
.hidden{display:none !important}

/* ═══════════════════════════════════════════════════════════════════
   BOARD (KANBAN)
   ══════════════════════════════════════════════════════════════════ */
.board{padding:14px;display:flex;gap:12px;height:100%;overflow-x:auto;overflow-y:hidden}
.col{flex:0 0 280px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);display:flex;flex-direction:column;max-height:100%;min-height:200px}
.col-h{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:var(--rm) var(--rm) 0 0}
.col-h .ti{font-weight:600;font-size:14px;flex:1}
.col-h .cnt{color:var(--muted);font-size:12px;font-family:var(--mono)}
.col-h .cnt.over{color:var(--red);font-weight:600}
.col-body{padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;min-height:60px}
.card{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:var(--r);padding:8px 10px;cursor:pointer;display:flex;flex-direction:column;gap:6px;transition:.12s}
.card:hover{box-shadow:var(--shadow);border-color:var(--border2)}
.card.t-epic   {border-left-color:var(--purple)}
.card.t-feature{border-left-color:var(--orange)}
.card.t-story  {border-left-color:var(--blue)}
.card.t-task   {border-left-color:var(--yellow)}
.card.t-bug    {border-left-color:var(--red)}
.card .row1{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}

/* Drag-and-drop visual feedback */
.drag-ghost{opacity:.4;background:var(--blue-dim) !important;border:1px dashed var(--blue) !important}
.drag-chosen{box-shadow:var(--shadow-lg)}
.drag-active{cursor:grabbing}
.col-body.drag-over-empty{background:var(--blue-dim) !important}

/* ═══════════════════════════════════════════════════════════════════
   SPRINTS PAGE
   ══════════════════════════════════════════════════════════════════ */
.sprints-wrap{padding:14px 16px;height:100%;display:flex;flex-direction:column}
.sprints-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sprints-toolbar select{font-size:13px;padding:4px 8px;min-width:200px}
.sp-empty{padding:60px 20px;text-align:center;color:var(--muted)}
.sp-empty .ti{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}
.sp-stats{display:flex;gap:14px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);margin-bottom:10px;flex-wrap:wrap}
.sp-stats .stat{font-size:12px;color:var(--muted)}
.sp-stats .stat strong{font-size:18px;color:var(--text);display:block;font-weight:600}
.sp-board{flex:1;display:flex;gap:12px;overflow-x:auto;min-height:0}
.sp-board .col{flex:0 0 280px}

/* ═══════════════════════════════════════════════════════════════════
   TAGS
   ══════════════════════════════════════════════════════════════════ */
.tag-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:2px;font-size:11px;font-weight:600;line-height:1.5;background:var(--blue-dim);color:var(--blue);cursor:default;white-space:nowrap}
.tag-chip.t-0{background:#deecf9;color:#0078d4}
.tag-chip.t-1{background:#e8e0f0;color:#5c2d91}
.tag-chip.t-2{background:#fed9cc;color:#d83b01}
.tag-chip.t-3{background:#fff4ce;color:#a67000}
.tag-chip.t-4{background:#dff6dd;color:#107c10}
.tag-chip.t-5{background:#fde7e9;color:#d13438}
.tag-chip.t-6{background:#cce4f0;color:#005a9e}
.tag-chip.t-7{background:#fdf2cc;color:#8a6a00}
[data-theme=dark] .tag-chip.t-0{background:#1a3a5c;color:#79b8ff}
[data-theme=dark] .tag-chip.t-1{background:#2a1a4a;color:#c4a8f5}
[data-theme=dark] .tag-chip.t-2{background:#4a2a1a;color:#ff8c5a}
[data-theme=dark] .tag-chip.t-3{background:#3a2a0a;color:#fbbf24}
[data-theme=dark] .tag-chip.t-4{background:#1a3a1f;color:#4ade80}
[data-theme=dark] .tag-chip.t-5{background:#4a1f1f;color:#f87171}
[data-theme=dark] .tag-chip.t-6{background:#1a2a3f;color:#7cb3ed}
[data-theme=dark] .tag-chip.t-7{background:#3a2f0a;color:#e8c060}
.tag-chip .x{cursor:pointer;margin-left:2px;opacity:.6;font-size:11px}
.tag-chip .x:hover{opacity:1}
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:4px;padding:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);min-height:32px;align-items:center}
.tag-input-wrap input{border:none;flex:1;min-width:80px;padding:2px 4px;background:transparent}
.tag-input-wrap input:focus{box-shadow:none}

/* ═══════════════════════════════════════════════════════════════════
   MARKDOWN RENDERED CONTENT
   ══════════════════════════════════════════════════════════════════ */
.md-body{font-size:13px;line-height:1.55;color:var(--text)}
.md-body p{margin:0 0 8px}
.md-body p:last-child{margin-bottom:0}
.md-body strong{font-weight:600}
.md-body em{font-style:italic}
.md-body code{font-family:var(--mono);font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:1px 5px}
.md-body pre{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;overflow-x:auto;font-family:var(--mono);font-size:12px;margin:6px 0}
.md-body pre code{background:none;border:none;padding:0}
.md-body ul, .md-body ol{margin:0 0 8px 22px}
.md-body li{margin-bottom:3px}
.md-body h1{font-size:18px;font-weight:600;margin:10px 0 6px}
.md-body h2{font-size:15px;font-weight:600;margin:8px 0 4px}
.md-body h3{font-size:14px;font-weight:600;margin:6px 0 4px}
.md-body a{color:var(--blue);text-decoration:underline}
.md-body blockquote{border-left:3px solid var(--border2);padding-left:10px;color:var(--text2);margin:6px 0}
.md-hint{font-size:11px;color:var(--muted);margin-top:4px;font-style:italic}
.card .row1 .type-ico{font-size:13px}
.card .row1 .id{font-family:var(--mono);font-weight:600}
.card .row1 .pts{margin-left:auto;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:1px 7px;font-family:var(--mono);font-weight:600;color:var(--text2)}
.card .ti{font-size:13px;font-weight:500;color:var(--text);line-height:1.35}
.card .row3{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.card .row3 .av{width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:600}
.card .row3 .children{display:inline-flex;align-items:center;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:1px 6px;font-family:var(--mono)}
.card .row3 .tag{background:var(--blue-dim);color:var(--blue);padding:0 6px;border-radius:2px;font-size:10px;font-weight:600}
.card .row3 .pri{font-weight:600;padding:0 6px;border-radius:2px}
.card .row3 .pri.p1{background:var(--red-dim);color:var(--red)}
.card .row3 .pri.p2{background:var(--orange-dim);color:var(--orange)}
.card .row3 .pri.p3{background:var(--blue-dim);color:var(--blue)}
.card .row3 .pri.p4{background:var(--surface);color:var(--muted)}

.add-card{margin-top:auto;padding:8px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);text-align:center;cursor:pointer;border-radius:0 0 var(--rm) var(--rm)}
.add-card:hover{background:var(--hover);color:var(--text)}

/* ═══════════════════════════════════════════════════════════════════
   BACKLOG (LIST)
   ══════════════════════════════════════════════════════════════════ */
.backlog{padding:14px 16px}
.backlog-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.backlog-toolbar select{padding:4px 8px;font-size:13px}
.bl-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);overflow:hidden}
.bl-h{display:grid;grid-template-columns:24px 40px 80px 1fr 140px 120px 80px;gap:8px;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.bl-row{display:grid;grid-template-columns:24px 40px 80px 1fr 140px 120px 80px;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;align-items:center;position:relative;background:var(--surface)}
.bl-row:hover{background:var(--hover)}
.bl-row:last-child{border-bottom:none}
.bl-row .drag-handle{cursor:grab;color:var(--muted);font-size:11px;letter-spacing:-2px;opacity:0;display:grid;place-items:center;user-select:none;touch-action:none}
.bl-row:hover .drag-handle{opacity:1}
.bl-row .drag-handle:active{cursor:grabbing}
.bl-row .expand{width:20px;height:20px;display:grid;place-items:center;color:var(--muted);cursor:pointer;border-radius:var(--r);font-size:10px}
.bl-row .expand:hover{background:var(--hover)}
.bl-row .expand.open{transform:rotate(90deg)}
.bl-row .expand.none{visibility:hidden}
.bl-row .id-cell{display:flex;align-items:center;gap:6px}
.bl-row .id-cell .type-ico{font-size:14px}
.bl-row .id-cell .id{font-family:var(--mono);font-size:12px;color:var(--muted);font-weight:600}
.bl-row .title-cell{display:flex;align-items:center;gap:6px;min-width:0}
.bl-row .title-cell .ti{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bl-row .add-child{visibility:hidden;width:22px;height:22px;border-radius:var(--r);display:grid;place-items:center;color:var(--blue);background:var(--blue-dim);font-weight:700;font-size:14px;cursor:pointer}
.bl-row:hover .add-child{visibility:visible}
.bl-row .add-child:hover{background:var(--blue);color:#fff}
.bl-row .av-name{display:flex;align-items:center;gap:6px;font-size:12px}
.bl-row .av-name .av{width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:600}
.bl-row .state{font-size:11px;padding:2px 8px;border-radius:2px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;display:inline-block}
.bl-row .state.s-new{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.bl-row .state.s-active{background:var(--blue-dim);color:var(--blue)}
.bl-row .state.s-resolved{background:var(--yellow-dim);color:#a67000}
.bl-row .state.s-closed{background:var(--green-dim);color:var(--green)}
.bl-row .rem-work{font-family:var(--mono);font-size:12px;color:var(--text2);text-align:right;padding-right:8px}
.bl-row.depth-1{padding-left:40px}
.bl-row.depth-2{padding-left:64px}
.bl-row.depth-3{padding-left:88px}
.bl-row.depth-4{padding-left:112px}
.bl-empty{padding:40px;text-align:center;color:var(--muted);font-style:italic}

.add-row{display:grid;grid-template-columns:40px 80px 1fr auto;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);align-items:center;background:var(--blue-dim)}
.add-row select,.add-row input{font-size:13px}
.add-row input{width:100%}

/* Inline-add picker menu (the "+ Add child" on backlog rows) */
.add-menu{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);box-shadow:var(--shadow-lg);padding:4px;min-width:180px;z-index:100}
.add-menu .item{padding:8px 12px;cursor:pointer;font-size:13px;border-radius:var(--r);display:flex;align-items:center;gap:8px}
.add-menu .item:hover{background:var(--hover)}
.add-menu .item .type-ico{font-size:14px}

<script>
'use strict';

// ════════════════════════════════════════════════════════════════════
// CONFIG — same Supabase project as the main app
// ════════════════════════════════════════════════════════════════════
const SUPABASE_URL      = 'https://ouppawndgtiejiebamph.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_9gI5pdoJHW9DxvJ98KjGaw_C-7VsMP5';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, storageKey: 'pm-ado-auth' }

// ════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════
const state = {
  user: null,
  profile: null,
  memberships: [],
  currentWsId: null,
  currentRole: 'member',
  projects: [],
  currentProjectId: null,
  currentPage: 'overview',     // 'overview' | 'board' | 'backlog' | 'sprints' | 'detail' | 'members'
  currentItemId: null,

  iterations: [],              // workspace-scoped sprint list

  channels: { wi:null, wic:null, wicol:null, it:null },
};

// ════════════════════════════════════════════════════════════════════
// CONSTANTS — type hierarchy & visuals
// ════════════════════════════════════════════════════════════════════
const TYPE_META = {
  epic:    { ico: '👑', label: 'Epic',    color: 'purple', children: ['feature'] },
  feature: { ico: '✦',  label: 'Feature', color: 'orange', children: ['story'] },
  story:   { ico: '📖', label: 'Story',   color: 'blue',   children: ['task','bug'] },
  task:    { ico: '✓',  label: 'Task',    color: 'yellow', children: [] },
  bug:     { ico: '🐞', label: 'Bug',     color: 'red',    children: [] },
};
const TYPE_ORDER = ['epic','feature','story','task','bug'];

const STATE_META = {
  new:      { label: 'New',      class:'s-new' },
  active:   { label: 'Active',   class:'s-active' },
  resolved: { label: 'Resolved', class:'s-resolved' },
  closed:   { label: 'Closed',   class:'s-closed' },
};
const STATE_ORDER = ['new','active','resolved','closed'];

// ════════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initial = s => (s||'?').trim().charAt(0).toUpperCase();

// ── Tag color hashing — stable color per tag name ────────────────────
function tagColorClass(name){
  let h = 0;
  for(let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  return 't-' + (Math.abs(h) % 8);
}
function renderTagChip(name, removable=false){
  return `<span class="tag-chip ${tagColorClass(name)}" data-tag="${esc(name)}">${esc(name)}${removable ? '<span class="x" data-rm-tag="'+esc(name)+'">×</span>' : ''}</span>`;
}
function allTags(){
  const set = new Set();
  for(const w of state.workItems){
    for(const t of (w.tags || [])) set.add(t);
  }
  return [...set].sort();
}

// ── Minimal markdown renderer + sanitizer ──────────────────────────────
// Supports: headings (#, ##, ###), bold (**x**), italic (*x*), inline
// code (`x`), code blocks (```), bullet/numbered lists, links [t](url),
// blockquotes (>), and paragraph breaks. Everything is escaped first
// then we re-introduce a fixed, safe set of tags. Links: only http(s)/
// mailto allowed.
function renderMarkdown(src){
  if(!src) return '';
  // 1) Escape HTML
  let s = String(src).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  // 2) Code blocks (fence ```)
  const codeBlocks = [];
  s = s.replace(/```([\s\S]*?)```/g, (_, code)=>{
    codeBlocks.push(code);
    return `\x00CODEBLOCK${codeBlocks.length-1}\x00`;
  });
  // 3) Inline code
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // 4) Headings
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  // 5) Bold / italic
  s = s.replace(/\*\*([^\*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(?<!\*)\*([^\*\n]+)\*(?!\*)/g, '<em>$1</em>');
  // 6) Links — http(s) and mailto only
  s = s.replace(/\[([^\]]+)\]\(((?:https?:\/\/|mailto:)[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  // 7) Blockquotes
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // 8) Lists — group consecutive list items
  // Bullet
  s = s.replace(/(?:^- (.+)(?:\n|$))+/gm, m => {
    const items = m.trim().split(/\n/).map(l => '<li>' + l.replace(/^- /, '') + '</li>').join('');
    return '<ul>' + items + '</ul>';
  });
  // Numbered
  s = s.replace(/(?:^\d+\. (.+)(?:\n|$))+/gm, m => {
    const items = m.trim().split(/\n/).map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>').join('');
    return '<ol>' + items + '</ol>';
  });
  // 9) Paragraphs — split on blank lines, wrap non-block lines in <p>
  s = s.split(/\n{2,}/).map(block => {
    block = block.trim();
    if(!block) return '';
    if(/^<(h[1-3]|ul|ol|blockquote|pre)/.test(block)) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  // 10) Restore code blocks
  s = s.replace(/\x00CODEBLOCK(\d+)\x00/g, (_, i)=> {
    return '<pre><code>' + codeBlocks[parseInt(i)] + '</code></pre>';
  });
  return s;
}
const show = id => $(id).classList.remove('hidden');
const hide = id => $(id).classList.add('hidden');

function toast(msg, kind=''){
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  el.textContent = msg;
  $('toast-root').appendChild(el);
  setTimeout(()=> el.remove(), 3200);
}

function friendlyError(e){
  if(!e) return 'Unknown error';
  const m = e.message || e.error_description || JSON.stringify(e);
  if(e.code === '42501') return 'Permission denied (RLS)';
  if(e.code === '23505') return 'Already exists';
  if(e.code === '23503') return 'Linked record not found';
  return m;
}

function fmtTime(iso){
  if(!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if(diff < 60) return 'just now';
  if(diff < 3600) return Math.floor(diff/60) + 'm ago';
  if(diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if(diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return d.toLocaleDateString();
}

// ════════════════════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════════════════════
let authMode = 'signin';
$('btn-signin').onclick = async ()=>{
  const email = $('email').value.trim();
  const password = $('password').value;
  if(!email){ toast('Email required','err'); return; }
  if(authMode === 'magic'){
    const { error } = await sb.auth.signInWithOtp({ email });
    if(error){ toast(friendlyError(error),'err'); return; }
    toast('Magic link sent — check email','ok');
    return;
  }
  if(!password){ toast('Password required','err'); return; }
  if(authMode === 'signup'){
    const { error } = await sb.auth.signUp({ email, password });
    if(error){ toast(friendlyError(error),'err'); return; }
    toast('Check email to confirm, then sign in','ok');
    setAuthMode('signin');
    return;
  }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ toast(friendlyError(error),'err'); return; }
  if(data?.user){ await enterApp(data.user); }
};

function setAuthMode(m){
  authMode = m;
  $('btn-signin').textContent = m === 'signup' ? 'Sign up' : (m === 'magic' ? 'Send link' : 'Sign in');
  $('password').style.display = m === 'magic' ? 'none' : '';
  $('password').previousElementSibling.style.display = m === 'magic' ? 'none' : '';
}
$('link-signup').onclick = ()=> setAuthMode(authMode === 'signup' ? 'signin' : 'signup');
$('link-magic').onclick  = ()=> setAuthMode(authMode === 'magic'  ? 'signin' : 'magic');

$('signout').onclick = async ()=>{
  await sb.auth.signOut();
  location.reload();
};

// supabase-js fires SIGNED_IN whenever it restores a session (every page
// load) as well as on actual login. We track whether boot has finished
// and only act on events from THAT point on. Even then, we don't reload
// the page — we just re-enter the app with the new user if relevant.
let bootDone = false;
sb.auth.onAuthStateChange((event, session)=>{
  if(!bootDone) return;
  if(event === 'SIGNED_OUT'){
    location.reload();
    return;
  }
  // SIGNED_IN / TOKEN_REFRESHED / USER_UPDATED — if we're not already
  // showing the app for this user, enter it.
  if(session?.user && (!state.user || state.user.id !== session.user.id)){
    enterApp(session.user);
  }
});

// ════════════════════════════════════════════════════════════════════
// PROFILE & WORKSPACES
// ════════════════════════════════════════════════════════════════════
async function ensureProfile(user){
  const { data: existing } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
  if(existing) return existing;
  const display_name = user.user_metadata?.display_name || (user.email||'').split('@')[0] || 'User';
  const { data: ins } = await sb.from('profiles').insert({ id: user.id, display_name, email: user.email }).select().single();
  return ins;
}

async function loadWorkspaces(){

    .from('workspace_members')
    .select('workspace_id, role, workspaces:workspace_id(id, name, owner_id)')

  state.memberships = (data||[]).filter(m => m.workspaces);

  state.currentProjectId = null;

async function loadMembers(){

async function loadIterations(){
  if(!state.currentWsId){ state.iterations = []; return; }
  const { data, error } = await sb
    .from('iterations')
    .select('id, name, start_date, end_date, created_at')
    .eq('workspace_id', state.currentWsId)
    .order('start_date', { ascending: true, nullsFirst: true });
  if(error){ toast('Iterations: '+friendlyError(error),'err'); return; }
  state.iterations = data || [];
}

// Pick the "current" iteration: one where today is between start/end,
// or the most recent if none active, or the first one otherwise.
function currentIteration(){
  if(!state.iterations.length) return null;
  const today = new Date().toISOString().slice(0,10);
  const active = state.iterations.find(i =>
    i.start_date && i.end_date && i.start_date <= today && today <= i.end_date
  );
  if(active) return active;
  // Future or null-dated: pick first; otherwise most recent past
  const sorted = [...state.iterations].sort((a,b) => (b.start_date||'').localeCompare(a.start_date||''));
  return sorted[0] || null;
}

// WORK ITEMS
// ════════════════════════════════════════════════════════════════════
async function loadWorkItems(){
  if(!state.currentProjectId){ state.workItems = []; return; }
  const { data, error } = await sb
    .from('work_items')
    .select('id, project_id, workspace_id, parent_id, type, title, description, state, priority, story_points, initial_estimate, remaining_work, assignee_id, area, iteration, iteration_id, tags, display_id, created_by, created_at, updated_at, position, assignee:assignee_id(id, display_name)')
    .eq('project_id', state.currentProjectId)
    .order('position', { ascending: true, nullsFirst: false });
  if(error){ toast('Items: '+friendlyError(error),'err'); return; }
  state.workItems = data || [];
}

function childrenOf(parentId){
  return state.workItems.filter(w => w.parent_id === parentId);
}
function itemById(id){
  return state.workItems.find(w => w.id === id);
}

async function createWorkItem(payload){
  payload.id = crypto.randomUUID();
  payload.workspace_id = state.currentWsId;
  payload.project_id = state.currentProjectId;
  payload.created_by = state.user.id;
  // Default position: append to end of same-state/same-parent group
  if(payload.position == null){
    const siblings = state.workItems.filter(w =>
      w.parent_id === (payload.parent_id || null) &&
      (payload.state ? w.state === payload.state : true)
    );
    const maxPos = siblings.reduce((m, w) => Math.max(m, w.position || 0), 0);
    payload.position = maxPos + 1000;
  }
  const { error } = await sb.from('work_items').insert(payload);
  if(error){ toast(friendlyError(error),'err'); return null; }
  await loadWorkItems();
  return payload.id;
}

async function updateWorkItem(id, patch){
  const { error } = await sb.from('work_items').update(patch).eq('id', id);
  if(error){ toast(friendlyError(error),'err'); return false; }
  // Optimistic local update
  const it = itemById(id);
  if(it) Object.assign(it, patch);
  return true;
}

async function deleteWorkItem(id){
  if(!confirm('Delete this work item? Its children will lose their parent link but remain.')) return;
  const { error } = await sb.from('work_items').delete().eq('id', id);
  if(error){ toast(friendlyError(error),'err'); return; }
  toast('Deleted','ok');
  await loadWorkItems();
  if(state.currentPage === 'detail' && state.currentItemId === id){
    goPage('backlog');
  } else {
    rerenderCurrent();
  }
}

function rerenderCurrent(){
  if(state.currentPage === 'board') renderBoard();
  else if(state.currentPage === 'backlog') renderBacklog();
  else if(state.currentPage === 'detail') renderDetail();
  else if(state.currentPage === 'overview') renderOverview();
}

// ════════════════════════════════════════════════════════════════════
// REALTIME
// ════════════════════════════════════════════════════════════════════
function unsubAll(){
  for(const k of Object.keys(state.channels)){
    if(state.channels[k]){ sb.removeChannel(state.channels[k]); state.channels[k] = null; }
  }
}

function subscribeRealtime(){
  if(!state.currentProjectId) return;
  unsubAll();
  const pid = state.currentProjectId;
  state.channels.wi = sb.channel('wi-'+pid)
    .on('postgres_changes', { event:'*', schema:'public', table:'work_items', filter:`project_id=eq.${pid}` },
      async ()=>{ await loadWorkItems(); rerenderCurrent(); })
    .subscribe();
  state.channels.wic = sb.channel('wic-'+pid)
    .on('postgres_changes', { event:'*', schema:'public', table:'work_item_comments' },
      ()=>{ if(state.currentPage === 'detail') loadDetailComments(); })
    .subscribe();
  state.channels.it = sb.channel('it-'+state.currentWsId)
    .on('postgres_changes', { event:'*', schema:'public', table:'iterations', filter:`workspace_id=eq.${state.currentWsId}` },
      async ()=>{ await loadIterations(); if(state.currentPage==='sprints') renderSprintsPage(); })
    .subscribe();
}

function renderBoardHeader(){
  if(!state.currentProjectId) return;

  const acts = $('sub-actions');
  acts.innerHTML = `

      <option value="epic">Epics</option>

  $('board-type-filter').onchange = renderBoard;
  $('board-new').onclick = ()=>{

function renderBoard(){
  if(!state.currentProjectId){
    $('board-cols').innerHTML = '<div class="empty-state"><div class="ti">No project selected</div><div class="bd">Pick a project from the sidebar.</div></div>';
    return;
  }
  const typeFilter = $('board-type-filter')?.value || 'story';
  const items = state.workItems.filter(w => w.type === typeFilter);
  const byState = { new:[], active:[], resolved:[], closed:[] };
  for(const w of items){ (byState[w.state] || byState.new).push(w); }

  const html = STATE_ORDER.map(s => {
    const meta = STATE_META[s];
    const list = byState[s] || [];
    return `<div class="col" data-state="${s}">
      <div class="col-h">
        <div class="ti">${meta.label}</div>
        <div class="cnt">${list.length}</div>
      </div>
      <div class="col-body">
        ${list.map(w => renderCard(w)).join('')}
      </div>
      <div class="add-card" data-state="${s}">+ Add work item</div>
    </div>`;
  }).join('');
  $('board-cols').innerHTML = html;
  $('board-cols').querySelectorAll('.card').forEach(c => c.onclick = ()=> openDetail(c.dataset.id));
  $('board-cols').querySelectorAll('.add-card').forEach(b => b.onclick = ()=> openNewItemModal({ type: typeFilter, state: b.dataset.state }));

  // Enable drag-and-drop on each column body
  if(window.Sortable){
    $('board-cols').querySelectorAll('.col-body').forEach(body => {
      // Skip if already initialized
      if(body._sortable){ body._sortable.destroy(); }
      body._sortable = new Sortable(body, {
        group: 'board-' + (state.currentProjectId || 'x'),
        animation: 150,
        ghostClass: 'drag-ghost',
        chosenClass: 'drag-chosen',
        dragClass: 'drag-active',
        forceFallback: true,           // better touch behavior on phones
        fallbackTolerance: 4,
        delay: 150,                    // tap delay so click vs. drag isn't ambiguous on touch
        delayOnTouchOnly: true,
        onEnd: async (evt)=>{
          const card = evt.item;
          const itemId = card.dataset.id;
          const targetCol = evt.to.closest('.col');
          const newState = targetCol?.dataset.state;
          if(!itemId || !newState) return;
          // Compute new position from neighbours in target column
          const cards = [...evt.to.querySelectorAll('.card')];
          const idx = cards.indexOf(card);
          const prev = cards[idx-1];
          const next = cards[idx+1];
          const prevPos = prev ? (itemById(prev.dataset.id)?.position ?? 0) : null;
          const nextPos = next ? (itemById(next.dataset.id)?.position ?? null) : null;
          let newPos;
          if(prevPos == null && nextPos == null)        newPos = 1000;
          else if(prevPos == null)                       newPos = nextPos - 1000;
          else if(nextPos == null)                       newPos = prevPos + 1000;
          else                                           newPos = (prevPos + nextPos) / 2;

          const item = itemById(itemId);
          const stateChanged = item && item.state !== newState;
          const patch = { state: newState, position: newPos };
          // Optimistic local update
          if(item){ item.state = newState; item.position = newPos; }
          const ok = await updateWorkItem(itemId, patch);
          if(!ok){
            // Reload to undo any local optimism that's now wrong
            await loadWorkItems();
            renderBoard();
            return;
          }
          if(stateChanged){
            const sm = STATE_META[newState];
            toast(`Moved to ${sm.label}`, 'ok');
          }
          // Re-render counts/columns
          renderBoard();
        },
      });
    });
  }
}

function renderCard(w){
  const tm = TYPE_META[w.type] || TYPE_META.task;
  const av = w.assignee ? `<span class="av" title="${esc(w.assignee.display_name)}">${esc(initial(w.assignee.display_name))}</span>` : '';
  const kids = childrenOf(w.id);

  const tags = (w.tags || []).slice(0, 3).map(t => renderTagChip(t)).join(' ');

}

// BACKLOG (LIST WITH HIERARCHY)
// ════════════════════════════════════════════════════════════════════
$('bl-type-filter')  && ($('bl-type-filter').onchange = renderBacklog);
$('bl-state-filter') && ($('bl-state-filter').onchange = renderBacklog);
$('bl-tag-filter')   && ($('bl-tag-filter').onchange = renderBacklog);
$('bl-new-top')      && ($('bl-new-top').onclick = ()=> openNewItemModal({}));

// Track expanded state per item id (persist in localStorage so it survives reload)
const expandedKey = ()=> 'pm-ado:exp:'+state.currentProjectId;
function getExpanded(){
  try{ return new Set(JSON.parse(localStorage.getItem(expandedKey()) || '[]')); }catch{ return new Set(); }
}
function setExpanded(set){
  try{ localStorage.setItem(expandedKey(), JSON.stringify([...set])); }catch{}
}

function renderBacklog(){
  // Refresh tag-filter options (preserve current selection)
  const tagSel = $('bl-tag-filter');
  if(tagSel){
    const cur = tagSel.value;
    const tags = allTags();
    tagSel.innerHTML = '<option value="">All tags</option>' +
      tags.map(t => `<option value="${esc(t)}" ${t===cur?'selected':''}>${esc(t)}</option>`).join('');
  }

  if(!state.currentProjectId){
    $('bl-tree').innerHTML = '<div class="bl-empty">No project selected</div>';
    return;
  }
  const typeF  = $('bl-type-filter')?.value  || 'all';
  const stateF = $('bl-state-filter')?.value || 'open';
  const tagF   = $('bl-tag-filter')?.value   || '';
  // Build filtered set
  const matches = (w) => {
    if(typeF !== 'all' && w.type !== typeF) return false;
    if(tagF && !(w.tags || []).includes(tagF)) return false;
    if(stateF === 'open') return w.state !== 'closed';
    if(stateF !== 'all') return w.state === stateF;
    return true;
  };
  // If filtering by type, show flat (no hierarchy nesting because parents may not match).
  // If not filtering by type, show hierarchical tree starting from roots (items with no parent
  // or parent not in matches set).
  const matching = state.workItems.filter(matches);
  let rowsHtml = '';
  const expanded = getExpanded();

  if(typeF !== 'all' || tagF){
    // Flat list when filtering by type or tag (parents may not match)
    rowsHtml = matching.map(w => renderBacklogRow(w, 0, false, false)).join('');
  } else {
    // Tree
    const matchingIds = new Set(matching.map(w => w.id));
    const roots = matching.filter(w => !w.parent_id || !matchingIds.has(w.parent_id));
    function walk(w, depth){
      const kids = childrenOf(w.id).filter(matches);
      const isExp = expanded.has(w.id);
      rowsHtml += renderBacklogRow(w, depth, kids.length > 0, isExp);
      if(isExp){
        for(const k of kids) walk(k, depth+1);
      }
    }
    for(const r of roots) walk(r, 0);
  }

  $('bl-tree').innerHTML = `
    <div class="bl-h">
      <div></div>
      <div></div>
      <div>ID</div>
      <div>Title</div>
      <div>Assigned to</div>
      <div>State</div>
      <div style="text-align:right">Remain</div>
    </div>
    ${rowsHtml || '<div class="bl-empty">No work items match these filters. Try "+ New work item" or change the filter.</div>'}`;

  // Wire
  $('bl-tree').querySelectorAll('.bl-row').forEach(row => {
    row.onclick = (e) => {
      if(e.target.closest('.add-child') || e.target.closest('.expand') || e.target.closest('.drag-handle')) return;
      openDetail(row.dataset.id);
    };
    const exp = row.querySelector('.expand');
    if(exp) exp.onclick = (e)=>{
      e.stopPropagation();
      const set = getExpanded();
      if(set.has(row.dataset.id)) set.delete(row.dataset.id);
      else set.add(row.dataset.id);
      setExpanded(set);
      renderBacklog();
    };
    const add = row.querySelector('.add-child');
    if(add) add.onclick = (e)=>{
      e.stopPropagation();
      openAddChildMenu(add, row.dataset.id);
    };
  });

  // Enable drag-to-reorder. Items can only be reordered among siblings
  // (same parent_id). Drops that would change parent are rejected and
  // we fall back to the original position.
  if(window.Sortable){
    const tree = $('bl-tree');
    if(tree._sortable){ tree._sortable.destroy(); }
    tree._sortable = new Sortable(tree, {
      handle: '.drag-handle',
      animation: 150,
      ghostClass: 'drag-ghost',
      chosenClass: 'drag-chosen',
      dragClass: 'drag-active',
      filter: '.bl-h',                  // header row not draggable
      preventOnFilter: false,
      forceFallback: true,
      fallbackTolerance: 4,
      onEnd: async (evt)=>{
        const row = evt.item;
        const itemId = row.dataset.id;
        const item = itemById(itemId);
        if(!item) return;
        // Determine new parent: look at the row above; if it is a valid
        // parent for this type, attach as its child; otherwise, attach
        // as sibling of whatever's above (i.e. same parent).
        const allRows = [...tree.querySelectorAll('.bl-row')];
        const idx = allRows.indexOf(row);
        const above = idx > 0 ? allRows[idx-1] : null;
        const below = idx < allRows.length - 1 ? allRows[idx+1] : null;
        let newParentId = null;
        if(above){
          const aboveItem = itemById(above.dataset.id);
          const aboveDepth = parseInt((above.className.match(/depth-(\d+)/)||[0,'0'])[1]);
          const myDepth   = parseInt((row.className.match(/depth-(\d+)/)||[0,'0'])[1]);
          if(aboveItem && myDepth > aboveDepth){
            // Visually placed under: check if valid child type
            if(TYPE_META[aboveItem.type]?.children?.includes(item.type)){
              newParentId = aboveItem.id;
            } else {
              // Invalid drop — revert
              toast(`Cannot place ${TYPE_META[item.type].label} under ${TYPE_META[aboveItem.type].label}`, 'err');
              renderBacklog();
              return;
            }
          } else if(aboveItem){
            newParentId = aboveItem.parent_id;
          }
        }
        // Compute new position among siblings
        const newSiblings = allRows.filter(r => {
          const it = itemById(r.dataset.id);
          return it && it.parent_id === newParentId;
        });
        const myNewIdx = newSiblings.indexOf(row);
        const prevSib = myNewIdx > 0 ? itemById(newSiblings[myNewIdx-1].dataset.id) : null;
        const nextSib = myNewIdx < newSiblings.length - 1 ? itemById(newSiblings[myNewIdx+1].dataset.id) : null;
        const prevPos = prevSib?.position ?? null;
        const nextPos = nextSib?.position ?? null;
        let newPos;
        if(prevPos == null && nextPos == null) newPos = 1000;
        else if(prevPos == null)                newPos = nextPos - 1000;
        else if(nextPos == null)                newPos = prevPos + 1000;
        else                                    newPos = (prevPos + nextPos) / 2;

        const patch = { position: newPos };
        if(item.parent_id !== newParentId) patch.parent_id = newParentId;

        // Optimistic
        Object.assign(item, patch);
        const ok = await updateWorkItem(itemId, patch);
        if(!ok){
          await loadWorkItems();
        }
        renderBacklog();
      },
    });
  }
}

function renderBacklogRow(w, depth, hasKids, isExp){
  const tm = TYPE_META[w.type] || TYPE_META.task;
  const sm = STATE_META[w.state] || STATE_META.new;
  const av = w.assignee ? `<span class="av" title="${esc(w.assignee.display_name)}">${esc(initial(w.assignee.display_name))}</span><span>${esc(w.assignee.display_name)}</span>` : '<span style="color:var(--muted)">—</span>';
  const childTypes = TYPE_META[w.type].children;
  const canAdd = childTypes.length > 0;
  return `<div class="bl-row depth-${Math.min(depth,4)}" data-id="${esc(w.id)}">
    <div class="drag-handle" title="Drag to reorder">⋮⋮</div>
    <div class="expand ${hasKids?'':'none'} ${isExp?'open':''}">▶</div>
    <div class="id-cell">
      <span class="type-ico" title="${esc(tm.label)}">${tm.ico}</span>
      <span class="id">#${w.display_id || '—'}</span>
    </div>
    <div class="title-cell">
      <span class="ti">${esc(w.title)}</span>
      ${(w.tags||[]).slice(0,2).map(t => renderTagChip(t)).join(' ')}
      ${canAdd ? '<button class="add-child" title="Add child">+</button>' : ''}
    </div>
    <div class="av-name">${av}</div>
    <div><span class="state ${sm.class}">${esc(sm.label)}</span></div>
    <div class="rem-work">${w.remaining_work != null ? w.remaining_work : ''}</div>
  </div>`;
}

function openAddChildMenu(anchor, parentId){
  const parent = itemById(parentId);
  if(!parent) return;
  const childTypes = TYPE_META[parent.type].children;
  if(!childTypes.length) return;
  // Close any existing menu
  document.querySelectorAll('.add-menu').forEach(m => m.remove());
  const r = anchor.getBoundingClientRect();
  const menu = document.createElement('div');
  menu.className = 'add-menu';
  menu.style.top = (r.bottom + 4) + 'px';
  menu.style.left = r.left + 'px';
  menu.innerHTML = childTypes.map(t => {
    const m = TYPE_META[t];
    return `<div class="item" data-t="${t}"><span class="type-ico">${m.ico}</span>Add ${esc(m.label)}</div>`;
  }).join('');
  document.body.appendChild(menu);
  menu.querySelectorAll('[data-t]').forEach(it => it.onclick = ()=>{
    menu.remove();
    openNewItemModal({ type: it.dataset.t, parent_id: parentId });
  });
  // Click-outside dismiss
  setTimeout(()=>{
    const off = (e)=>{
      if(!menu.contains(e.target)){ menu.remove(); document.removeEventListener('click', off); }
    };
    document.addEventListener('click', off);
  }, 0);
}

    <div class="modal-bg">

        <div class="modal-b">
          ${parent ? `<div class="field"><label>Parent</label><div style="padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:13px"><span style="font-family:var(--mono);color:var(--muted);font-size:11px">#${parent.display_id||'—'}</span> ${TYPE_META[parent.type].ico} ${esc(parent.title)}</div></div>` : ''}

              ${TYPE_ORDER.map(t => `<option value="${t}" ${t===type?'selected':''}>${TYPE_META[t].ico} ${TYPE_META[t].label}</option>`).join('')}
            </select>
          </div>

          <div class="field"><label>Description (optional)</label><textarea id="ni-desc"></textarea></div>
          <div class="field" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><label>State</label>
              <select id="ni-state">${STATE_ORDER.map(s => `<option value="${s}" ${s===(itemState||'new')?'selected':''}>${STATE_META[s].label}</option>`).join('')}</select>
            </div>
            <div><label>Priority</label>
              <select id="ni-priority">
                <option value="1">P1 — Critical</option>
                <option value="2" selected>P2 — High</option>
                <option value="3">P3 — Medium</option>
                <option value="4">P4 — Low</option>
              </select>
            </div>
          </div>
          <div class="field"><label>Assignee</label>
            <select id="ni-assignee">
              <option value="">— Unassigned —</option>
              ${state.members.map(m => `<option value="${esc(m.id)}">${esc(m.display_name)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="modal-f">
          <button class="btn ghost" id="cancel">Cancel</button>
          <button class="btn" id="ok">Create</button>
        </div>
      </div>
    </div>`;

  $('mx').onclick = close; $('cancel').onclick = close;
  setTimeout(()=> $('ni-title').focus(), 30);
  $('ok').onclick = async ()=>{
    const title = $('ni-title').value.trim();
    if(!title){ toast('Title required','err'); return; }
    const payload = {
      type: $('ni-type').value,
      title,
      description: $('ni-desc').value.trim(),
      state: $('ni-state').value,
      priority: parseInt($('ni-priority').value),
      assignee_id: $('ni-assignee').value || null,
      parent_id: parent_id || null,
    };
    const id = await createWorkItem(payload);
    if(id){
      close();
      toast('Created','ok');
      // If created from backlog with a parent, auto-expand the parent
      if(parent_id){
        const set = getExpanded(); set.add(parent_id); setExpanded(set);
      }
      rerenderCurrent();
    }
  };
}

function openDetail(id){
  state.backFrom = state.currentPage === 'detail' ? state.backFrom : state.currentPage;
  state.currentItemId = id;
  goPage('detail');
}

let detailComments = [];
async function loadDetailComments(){
  if(!state.currentItemId){ detailComments = []; renderDetail(); return; }
  const { data } = await sb
    .from('work_item_comments')
    .select('id, body, created_at, user_id, author:user_id(display_name)')
    .eq('work_item_id', state.currentItemId)
    .order('created_at', { ascending: true });
  detailComments = data || [];
  // Re-render only the comments section if detail is open
  const cm = document.getElementById('det-comments');
  if(cm) cm.innerHTML = renderCommentsHtml();
}

function renderCommentsHtml(){
  if(!detailComments.length) return '<div style="color:var(--muted);font-style:italic;font-size:13px;padding:8px 0">No comments yet. Start the discussion.</div>';
  return detailComments.map(c => `
    <div class="comment">
      <div class="av">${esc(initial(c.author?.display_name))}</div>
      <div class="body">
        <div class="head"><span class="nm">${esc(c.author?.display_name || 'Unknown')}</span><span class="ts">${esc(fmtTime(c.created_at))}</span></div>
        <div class="text md-body">${renderMarkdown(c.body)}</div>
      </div>
    </div>`).join('');
}

      if(saving) return;

  $('det-iteration-id').onchange = ()=> updateWorkItem(id, { iteration_id: $('det-iteration-id').value || null });
  const numOrNull = v => v === '' ? null : parseFloat(v);
  $('det-pts').onblur         = ()=> updateWorkItem(id, { story_points: numOrNull($('det-pts').value) });
  $('det-init').onblur        = ()=> updateWorkItem(id, { initial_estimate: numOrNull($('det-init').value) });
  $('det-rem').onblur         = ()=> updateWorkItem(id, { remaining_work: numOrNull($('det-rem').value) });

  // Tag input — Enter adds, X removes
  const tagInput = $('det-tag-input');
  const tagWrap  = $('det-tag-wrap');
  async function addTag(name){
    name = name.trim().toLowerCase();
    if(!name) return;
    if(name.length > 30) name = name.slice(0, 30);
    const existing = w.tags || [];
    if(existing.includes(name)) return;
    const newTags = [...existing, name];
    const ok = await updateWorkItem(id, { tags: newTags });
    if(ok){ w.tags = newTags; renderDetailTagsOnly(); }
  }
  async function removeTag(name){
    const newTags = (w.tags || []).filter(t => t !== name);
    const ok = await updateWorkItem(id, { tags: newTags });
    if(ok){ w.tags = newTags; renderDetailTagsOnly(); }
  }
  function renderDetailTagsOnly(){
    tagWrap.innerHTML = (w.tags || []).map(t => renderTagChip(t, true)).join(' ') +
      `<input id="det-tag-input" placeholder="${(w.tags||[]).length ? 'Add tag…' : 'Type a tag and press Enter'}">`;
    // Rewire input
    const newInput = $('det-tag-input');
    newInput.onkeydown = (e)=>{
      if(e.key === 'Enter' || e.key === ','){
        e.preventDefault();
        const v = newInput.value;
        newInput.value = '';
        addTag(v);
      } else if(e.key === 'Backspace' && newInput.value === '' && (w.tags||[]).length){
        // Backspace on empty input removes last tag
        removeTag(w.tags[w.tags.length-1]);
      }
    };
    tagWrap.querySelectorAll('[data-rm-tag]').forEach(x => x.onclick = (e)=>{
      e.stopPropagation();
      removeTag(x.dataset.rmTag);
    });
    newInput.focus();
  }
  tagInput.onkeydown = (e)=>{
    if(e.key === 'Enter' || e.key === ','){
      e.preventDefault();
      const v = tagInput.value;
      tagInput.value = '';
      addTag(v);
    } else if(e.key === 'Backspace' && tagInput.value === '' && (w.tags||[]).length){
      removeTag(w.tags[w.tags.length-1]);
    }
  };
  tagWrap.querySelectorAll('[data-rm-tag]').forEach(x => x.onclick = (e)=>{
    e.stopPropagation();
    removeTag(x.dataset.rmTag);
  });

  $('det-comment-send').onclick = async ()=>{
    const body = $('det-comment-input').value.trim();
    if(!body) return;
    $('det-comment-input').value = '';
    const { error } = await sb.from('work_item_comments').insert({
      work_item_id: id, user_id: state.user.id, body
    });
    if(error){ toast(friendlyError(error),'err'); return; }
    loadDetailComments();
  };

  document.querySelectorAll('[data-go]').forEach(el => el.onclick = ()=> openDetail(el.dataset.go));

  const addChildBtn = $('add-child-btn');
  if(addChildBtn) addChildBtn.onclick = ()=>{
    const t = TYPE_META[w.type].children[0];
    openNewItemModal({ type: t, parent_id: id });
  };
  const setParentBtn = $('set-parent-btn');
  if(setParentBtn) setParentBtn.onclick = ()=> openSetParentModal(id);
}

function openSetParentModal(id){
  const w = itemById(id);
  if(!w) return;
  // Valid parents: items whose type allows this item's type as a child
  const validParents = state.workItems.filter(p =>
    p.id !== id &&
    TYPE_META[p.type]?.children?.includes(w.type)
  );
  const root = $('modal-root');
  root.innerHTML = `
    <div class="modal-bg">
      <div class="modal">
        <div class="modal-h"><h3>Set parent</h3><button class="x" id="mx">×</button></div>
        <div class="modal-b">
          ${validParents.length === 0 ? `<div style="color:var(--muted);font-style:italic">No valid parents exist. Create a ${TYPE_META[w.type === 'task' || w.type === 'bug' ? 'story' : (w.type === 'story' ? 'feature' : 'epic')].label} first.</div>` : `
          <div class="field"><label>Choose a parent</label>
            <select id="sp-pid">
              <option value="">— None —</option>
              ${validParents.map(p => `<option value="${esc(p.id)}">${TYPE_META[p.type].ico} #${p.display_id||'—'} ${esc(p.title)}</option>`).join('')}
            </select>
          </div>`}
        </div>
        <div class="modal-f">
          <button class="btn ghost" id="cancel">Cancel</button>
          <button class="btn" id="ok" ${validParents.length === 0 ? 'disabled' : ''}>Save</button>
        </div>
      </div>
    </div>`;
  const close = ()=> root.innerHTML='';
  $('mx').onclick = close; $('cancel').onclick = close;
  if(validParents.length){
    $('ok').onclick = async ()=>{
      const pid = $('sp-pid').value || null;
      const ok = await updateWorkItem(id, { parent_id: pid });
      if(ok){ close(); renderDetail(); }
    };
  }
}

// ════════════════════════════════════════════════════════════════════
// SPRINTS PAGE
// ════════════════════════════════════════════════════════════════════
async function renderSprintsPage(){
  // Populate iteration picker
  const sel = $('sp-iteration');
  // Pick a default iteration if none set yet
  if(!state.currentIterationId){
    state.currentIterationId = currentIteration()?.id || '';
  }
  sel.innerHTML = '<option value="">— No iteration selected —</option>' +
    state.iterations.map(it => {
      const d = (it.start_date && it.end_date)
        ? ` (${it.start_date} → ${it.end_date})`
        : '';
      return `<option value="${esc(it.id)}" ${it.id===state.currentIterationId?'selected':''}>${esc(it.name)}${d}</option>`;
    }).join('');
  sel.onchange = ()=>{ state.currentIterationId = sel.value; renderSprintsPage(); };
  $('sp-manage').onclick = openManageIterationsModal;

  const board = $('sp-board');

  if(!state.iterations.length){
    board.innerHTML = `
      <div class="sp-empty">
        <div class="ti">No iterations yet</div>
        <div>Iterations group work into time-boxed sprints. Create one to get started.</div>
        <button class="btn" style="margin-top:12px" onclick="document.getElementById('sp-manage').click()">+ New iteration</button>
      </div>`;
    $('sp-meta').textContent = '';
    return;
  }
  if(!state.currentIterationId){
    board.innerHTML = '<div class="sp-empty"><div class="ti">Pick an iteration above</div></div>';
    $('sp-meta').textContent = '';
    return;
  }

  // Pull items in this iteration across all projects in the workspace
  const { data: items, error } = await sb
    .from('work_items')
    .select('id, project_id, type, title, state, priority, story_points, assignee_id, tags, display_id, position, assignee:assignee_id(id, display_name)')
    .eq('workspace_id', state.currentWsId)
    .eq('iteration_id', state.currentIterationId)
    .order('position', { ascending: true, nullsFirst: false });
  if(error){ toast('Sprint items: '+friendlyError(error),'err'); return; }
  const list = items || [];

  // Stats
  const totalPts = list.reduce((s,i) => s + (i.story_points || 0), 0);
  const donePts  = list.filter(i => i.state === 'closed').reduce((s,i) => s + (i.story_points || 0), 0);
  const it = state.iterations.find(i => i.id === state.currentIterationId);
  const dateRange = (it.start_date && it.end_date) ? `${it.start_date} → ${it.end_date}` : 'No dates';
  $('sp-meta').textContent = `${list.length} items · ${dateRange}`;

  const projById = Object.fromEntries(state.projects.map(p => [p.id, p]));

  const byState = { new:[], active:[], resolved:[], closed:[] };
  for(const w of list){ (byState[w.state] || byState.new).push(w); }

  const cols = STATE_ORDER.map(s => {
    const meta = STATE_META[s];
    const arr = byState[s] || [];
    return `<div class="col">
      <div class="col-h"><div class="ti">${meta.label}</div><div class="cnt">${arr.length}</div></div>
      <div class="col-body">
        ${arr.map(w => {
          const tm = TYPE_META[w.type] || TYPE_META.task;
          const av = w.assignee ? `<span class="av" title="${esc(w.assignee.display_name)}">${esc(initial(w.assignee.display_name))}</span>` : '';
          const pts = w.story_points != null ? `<span class="pts">${w.story_points}</span>` : '';
          const pri = w.priority ? `<span class="pri p${w.priority}">P${w.priority}</span>` : '';
          const proj = projById[w.project_id];
          const tags = (w.tags || []).slice(0,2).map(t => renderTagChip(t)).join(' ');
          return `<div class="card t-${w.type}" data-id="${esc(w.id)}">
            <div class="row1">
              <span class="type-ico">${tm.ico}</span>
              <span class="id">#${w.display_id || '—'}</span>
              ${proj ? `<span style="margin-left:6px;font-size:10px;color:var(--muted)">${esc(proj.name)}</span>` : ''}
              ${pts}
            </div>
            <div class="ti">${esc(w.title)}</div>
            <div class="row3">${pri}${tags ? ' '+tags : ''}${av ? '<span style="margin-left:auto">'+av+'</span>' : ''}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  board.innerHTML = `
    <div class="sp-stats">
      <div class="stat"><strong>${list.length}</strong>Total items</div>
      <div class="stat"><strong>${totalPts}</strong>Total points</div>
      <div class="stat"><strong>${donePts}</strong>Completed points</div>
      <div class="stat"><strong>${totalPts > 0 ? Math.round(donePts/totalPts*100) : 0}%</strong>Progress</div>
    </div>
    <div class="sp-board">${cols}</div>`;
  board.querySelectorAll('.card').forEach(c => c.onclick = ()=> openDetail(c.dataset.id));
}

function openManageIterationsModal(){
  const root = $('modal-root');
  root.innerHTML = `
    <div class="modal-bg">
      <div class="modal" style="max-width:560px">
        <div class="modal-h"><h3>Manage iterations</h3><button class="x" id="mx">×</button></div>
        <div class="modal-b">
          <div id="it-list" style="margin-bottom:14px"></div>
          <div style="border-top:1px solid var(--border);padding-top:14px">
            <div style="font-weight:600;font-size:13px;margin-bottom:8px">New iteration</div>
            <div class="field"><label>Name</label><input id="it-name" placeholder="e.g. Sprint 7" maxlength="60"></div>
            <div class="field row" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div><label>Start date</label><input type="date" id="it-start"></div>
              <div><label>End date</label><input type="date" id="it-end"></div>
            </div>
            <button class="btn" id="it-add">+ Add iteration</button>
          </div>
        </div>
        <div class="modal-f"><button class="btn ghost" id="close">Close</button></div>
      </div>
    </div>`;
  const close = ()=> root.innerHTML='';
  $('mx').onclick = close; $('close').onclick = close;

  function renderList(){
    if(!state.iterations.length){
      $('it-list').innerHTML = '<div style="color:var(--muted);font-style:italic;font-size:13px">No iterations yet</div>';
      return;
    }
    $('it-list').innerHTML = state.iterations.map(it => {
      const d = (it.start_date && it.end_date) ? `${it.start_date} → ${it.end_date}` : '(no dates)';
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:13px">${esc(it.name)}</div>
          <div style="font-size:11px;color:var(--muted)">${esc(d)}</div>
        </div>
        <button class="btn ghost sm" data-del="${esc(it.id)}">Delete</button>
      </div>`;
    }).join('');
    $('it-list').querySelectorAll('[data-del]').forEach(b => b.onclick = async ()=>{
      if(!confirm('Delete this iteration? Work items will lose their iteration link.')) return;
      const { error } = await sb.from('iterations').delete().eq('id', b.dataset.del);
      if(error){ toast(friendlyError(error),'err'); return; }
      await loadIterations();
      renderList();
      if(state.currentIterationId === b.dataset.del){
        state.currentIterationId = null;
      }
    });
  }
  renderList();

  $('it-add').onclick = async ()=>{
    const name = $('it-name').value.trim();
    if(!name){ toast('Name required','err'); return; }
    const payload = {
      id: crypto.randomUUID(),
      workspace_id: state.currentWsId,
      name,
      start_date: $('it-start').value || null,
      end_date: $('it-end').value || null,
      created_by: state.user.id,
    };
    const { error } = await sb.from('iterations').insert(payload);
    if(error){ toast(friendlyError(error),'err'); return; }
    $('it-name').value = ''; $('it-start').value = ''; $('it-end').value = '';
    await loadIterations();
    renderList();
    toast('Iteration created','ok');
  };
}

// MEMBERS PAGE (minimal — list + invite)
// ════════════════════════════════════════════════════════════════════
async function renderMembers(){
  const el = $('members-content');
  el.innerHTML = '<div style="padding:20px;color:var(--muted)">Loading…</div>';
  const { data } = await sb
    .from('workspace_members')
    .select('user_id, role, profiles:user_id(id, display_name, email)')
    .eq('workspace_id', state.currentWsId);
  const mems = (data || []).map(r => ({ ...r.profiles, role: r.role })).filter(p => p.id);
  el.innerHTML = `
    <h2 style="font-size:16px;font-weight:600;margin-bottom:14px">Workspace members</h2>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);overflow:hidden">
      ${mems.map(m => `
        <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border)">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-weight:600">${esc(initial(m.display_name))}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px">${esc(m.display_name)}${m.id===state.user.id?' (you)':''}</div>
            <div style="font-size:11px;color:var(--muted)">${esc(m.email||'')}</div>
          </div>
          <span style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600">${esc(m.role)}</span>
        </div>`).join('')}
    </div>
    <div style="margin-top:24px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rm)">
      <h3 style="font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:8px">Note</h3>
      <div style="font-size:13px;color:var(--text2)">Member invitations live in the original ProMapp app — this ADO-style view shares the same workspace, so invites accepted there appear here automatically.</div>
    </div>`;
}

// ════════════════════════════════════════════════════════════════════
// THEME
// ════════════════════════════════════════════════════════════════════
function applyTheme(){
  const t = localStorage.getItem('pm-ado:theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
}
$('theme-toggle').onclick = ()=>{
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  try{ localStorage.setItem('pm-ado:theme', next); }catch{}
};
applyTheme();

// ════════════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════════════
async function boot(){
  try{
    const { data: { session } } = await sb.auth.getSession();
    hide('boot');
    if(session?.user){ await enterApp(session.user); }
    else{ show('auth'); }
  }catch(e){
    hide('boot');
    show('auth');
    toast('Boot error: ' + (e?.message || e), 'err');
  }finally{
    bootDone = true;
  }
}

async function enterApp(user){
  // Guard: if we're already showing the app for this user, do nothing.
  if(state.user && state.user.id === user.id && $('app').classList.contains('show')){
    return;
  }
  state.user = user;
  state.profile = await ensureProfile(user);
  $('user-nm').textContent = state.profile.display_name;
  $('user-av').textContent = initial(state.profile.display_name);
  hide('auth');
  $('app').classList.add('show');
  await loadWorkspaces();
}

boot();
</script>
