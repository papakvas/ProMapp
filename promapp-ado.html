// ════════════════════════════════════════════════════════════════════
async function renderOverview(){
  const el = $('overview-content');
  if(!state.projects.length){
    el.innerHTML = `
      <div class="empty-state">
        <div class="ico">📋</div>
        <div class="ti">Δεν υπάρχουν έργα ακόμη</div>
        <div class="bd">Δημιουργήστε το πρώτο σας έργο για να ξεκινήσετε.</div>
        <button class="btn" id="ov-new-proj" style="margin-top:16px">+ Νέο έργο</button>
      </div>`;
    $('ov-new-proj').onclick = openNewProjectModal;
    return;
  }
  // Pull all workspace work items. custom_fields may be absent on older DBs.
  let all = [];
  try{
    const res = await sb
      .from('work_items')
      .select('id, project_id, type, title, state, priority, story_points, assignee_id, iteration_id, custom_fields, display_id, updated_at, assignee:assignee_id(id, display_name)')
      .eq('workspace_id', state.currentWsId);
    if(res.error) throw res.error;
    all = res.data || [];
  }catch(e){
    const res2 = await sb
      .from('work_items')
      .select('id, project_id, type, title, state, priority, story_points, assignee_id, iteration_id, display_id, updated_at, assignee:assignee_id(id, display_name)')
      .eq('workspace_id', state.currentWsId);
    all = res2.data || [];
  }
  const items = all || [];
  const byProj = {};
  for(const w of items) (byProj[w.project_id] ||= []).push(w);
  const myOpen   = items.filter(w => w.assignee_id === state.user.id && w.state !== 'closed').length;
  const totalOpen = items.filter(w => w.state !== 'closed').length;

  // Date helpers
  const today = new Date(); today.setHours(0,0,0,0);
  const todayIso = today.toISOString().slice(0,10);
  const weekEnd = new Date(today); weekEnd.setDate(weekEnd.getDate() + 7);
  const weekEndIso = weekEnd.toISOString().slice(0,10);

  // Today bucket: target_date == today, OR priority 1 + open + assigned to me,
  // OR iteration ends today.
  const iterEndsToday = new Set(state.iterations.filter(it => it.end_date === todayIso).map(it => it.id));
  const todayItems = items.filter(w => {
    if(w.state === 'closed') return false;
    const td = w.custom_fields?.target_date;
    if(td && td <= todayIso) return true;
    if(w.priority === 1 && w.assignee_id === state.user.id) return true;
    if(w.iteration_id && iterEndsToday.has(w.iteration_id)) return true;
    return false;
  });

  // This week bucket: target_date within next 7 days, OR active iteration & assigned to me
  const activeIter = currentIteration();
  const weekItems = items.filter(w => {
    if(w.state === 'closed') return false;
    const td = w.custom_fields?.target_date;
    if(td && td >= todayIso && td <= weekEndIso) return true;
    if(activeIter && w.iteration_id === activeIter.id && w.assignee_id === state.user.id) return true;
    return false;
  });

  // Tab selection persisted
  const tab = localStorage.getItem('pm-ado:ov-tab') || 'projects';

  function renderItemRow(w){
    const tm = TYPE_META[w.type] || TYPE_META.task;
    const sm = STATE_META[w.state] || STATE_META.new;
    const av = w.assignee ? `<span class="av" title="${esc(w.assignee.display_name)}">${esc(initial(w.assignee.display_name))}</span>` : '';
    const proj = state.projects.find(p => p.id === w.project_id);
    const td = w.custom_fields?.target_date;
    const tdLbl = td ? `<span style="font-size:11px;color:${td <= todayIso ? 'var(--red)' : 'var(--muted)'};margin-left:6px">📅 ${esc(td)}</span>` : '';
    const pri = w.priority === 1 ? `<span class="pri p1" style="margin-left:4px">P1</span>` : '';
    return `<div class="ov-row" data-id="${esc(w.id)}">
      <span class="type-ico" style="font-size:14px">${tm.ico}</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:600">#${w.display_id||'—'}</span>
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(w.title)}${pri}${tdLbl}</span>
      <span style="font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">${esc(proj?.name||'')}</span>
      <span class="state ${sm.class}">${esc(sm.label)}</span>
      ${av}
    </div>`;
  }
  function renderItemsList(arr, emptyMsg){
    if(!arr.length) return `<div style="padding:30px 14px;text-align:center;color:var(--muted);font-style:italic;font-size:13px">${esc(emptyMsg)}</div>`;
    return arr.map(renderItemRow).join('');
  }

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px">
      <div class="ov-stat"><div class="ov-stat-l">Έργα</div><div class="ov-stat-v">${state.projects.length}</div></div>
      <div class="ov-stat"><div class="ov-stat-l">Ανοιχτές εργασίες</div><div class="ov-stat-v">${totalOpen}</div></div>
      <div class="ov-stat"><div class="ov-stat-l">Ανατεθειμένες σε εσάς</div><div class="ov-stat-v">${myOpen}</div></div>
      <div class="ov-stat"><div class="ov-stat-l">Σήμερα</div><div class="ov-stat-v">${todayItems.length}</div></div>
    </div>

    <div class="ov-tabs">
      <button class="ov-tab ${tab==='projects'?'active':''}" data-tab="projects">Έργα</button>
      <button class="ov-tab ${tab==='today'?'active':''}" data-tab="today">Σήμερα</button>
      <button class="ov-tab ${tab==='week'?'active':''}" data-tab="week">Αυτή την εβδομάδα</button>
    </div>

    <div class="ov-pane ${tab==='today'?'':'hidden'}" id="ov-pane-today">
      <div class="ov-list">${renderItemsList(todayItems, 'Καμία εργασία για σήμερα. Καλή σας ημέρα!')}</div>
    </div>

    <div class="ov-pane ${tab==='week'?'':'hidden'}" id="ov-pane-week">
      <div class="ov-list">${renderItemsList(weekItems, 'Δεν υπάρχουν εργασίες με προθεσμία αυτή την εβδομάδα.')}</div>
    </div>

    <div class="ov-pane ${tab==='projects'?'':'hidden'}" id="ov-pane-projects">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
        ${state.projects.map(p => {
          const its = byProj[p.id] || [];
          const open = its.filter(i => i.state !== 'closed').length;
          const closed = its.length - open;
          const c = computeCompletion(its);
          const pctLine = c.countPct == null
            ? '<span style="color:var(--muted)">—</span>'
            : `<strong>${c.countPct}%</strong>${c.pointsPct != null ? ` <span style="color:var(--muted)">· ${c.pointsPct}% με πόντους</span>` : ''}`;
          return `<div class="proj-card" data-pid="${esc(p.id)}" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rm);padding:14px;cursor:pointer">
            <div style="font-weight:600;font-size:14px;margin-bottom:4px">#${esc(p.name)}</div>
            <div style="color:var(--muted);font-size:12px;margin-bottom:10px;min-height:32px">${esc(p.description||'Χωρίς περιγραφή')}</div>
            <div style="font-size:12px;margin-bottom:6px">${pctLine}</div>
            ${completionBar(c.countPct)}
            <div style="display:flex;gap:14px;font-size:12px;margin-top:8px">
              <span><strong>${open}</strong> <span style="color:var(--muted)">ανοιχτές</span></span>
              <span><strong>${closed}</strong> <span style="color:var(--muted)">κλειστές</span></span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  el.querySelectorAll('[data-pid]').forEach(n => n.onclick = async ()=>{
    await selectProject(n.dataset.pid);
    goPage('board');
  });
  el.querySelectorAll('.ov-row').forEach(r => r.onclick = ()=>{
    const w = items.find(x => x.id === r.dataset.id);
    if(!w) return;
    if(w.project_id !== state.currentProjectId){
      selectProject(w.project_id).then(()=> openDetail(w.id));
    } else openDetail(w.id);
  });
  el.querySelectorAll('.ov-tab').forEach(b => b.onclick = ()=>{
    const t = b.dataset.tab;
    try{ localStorage.setItem('pm-ado:ov-tab', t); }catch{}
    el.querySelectorAll('.ov-tab').forEach(x => x.classList.toggle('active', x.dataset.tab === t));
    el.querySelectorAll('.ov-pane').forEach(x => x.classList.toggle('hidden', x.id !== 'ov-pane-' + t));
  });
}

function renderBoard(){
  if(!state.currentProjectId){
    $('board-cols').innerHTML = '<div class="empty-state"><div class="ti">Δεν έχει επιλεγεί έργο</div><div class="bd">Επιλέξτε ένα έργο από το πλαϊνό μενού.</div></div>';
    return;
  }
  const typeFilter = $('board-type-filter')?.value || 'story';
  const items = state.workItems.filter(w => w.type === typeFilter);
  const byState = { new:[], active:[], resolved:[], closed:[] };
  for(const w of items){ (byState[w.state] || byState.new).push(w); }

  const html = STATE_ORDER.map(s => {
    const meta = STATE_META[s];
    const list = byState[s] || [];
    return `<div class="col" data-state="${s}">
      <div class="col-h">
        <div class="ti">${meta.label}</div>
        <div class="cnt">${list.length}</div>
      </div>
      <div class="col-body">
        ${list.map(w => renderCard(w)).join('')}
      </div>
      <div class="add-card" data-state="${s}">+ Προσθήκη εργασίας</div>
    </div>`;
  }).join('');
  $('board-cols').innerHTML = html;
  $('board-cols').querySelectorAll('.card').forEach(c => c.onclick = ()=> openDetail(c.dataset.id));
  $('board-cols').querySelectorAll('.add-card').forEach(b => b.onclick = ()=> openNewItemModal({ type: typeFilter, state: b.dataset.state }));

  // Enable drag-and-drop on each column body
  if(window.Sortable){
    $('board-cols').querySelectorAll('.col-body').forEach(body => {
      // Skip if already initialized
      if(body._sortable){ body._sortable.destroy(); }
      body._sortable = new Sortable(body, {
        group: 'board-' + (state.currentProjectId || 'x'),
        animation: 150,
        ghostClass: 'drag-ghost',
        chosenClass: 'drag-chosen',
        dragClass: 'drag-active',
        forceFallback: true,           // better touch behavior on phones
        fallbackTolerance: 4,
        delay: 150,                    // tap delay so click vs. drag isn't ambiguous on touch
        delayOnTouchOnly: true,
        onEnd: async (evt)=>{
          const card = evt.item;
          const itemId = card.dataset.id;
          const targetCol = evt.to.closest('.col');
          const newState = targetCol?.dataset.state;
          if(!itemId || !newState) return;
          // Compute new position from neighbours in target column
          const cards = [...evt.to.querySelectorAll('.card')];
          const idx = cards.indexOf(card);
          const prev = cards[idx-1];
          const next = cards[idx+1];
          const prevPos = prev ? (itemById(prev.dataset.id)?.position ?? 0) : null;
          const nextPos = next ? (itemById(next.dataset.id)?.position ?? null) : null;
          let newPos;
          if(prevPos == null && nextPos == null)        newPos = 1000;
          else if(prevPos == null)                       newPos = nextPos - 1000;
          else if(nextPos == null)                       newPos = prevPos + 1000;
          else                                           newPos = (prevPos + nextPos) / 2;

          const item = itemById(itemId);
          const stateChanged = item && item.state !== newState;
          const patch = { state: newState, position: newPos };
          // Optimistic local update
          if(item){ item.state = newState; item.position = newPos; }
          const ok = await updateWorkItem(itemId, patch);
          if(!ok){
            // Reload to undo any local optimism that's now wrong
            await loadWorkItems();
            renderBoard();
            return;
          }
          if(stateChanged){
            const sm = STATE_META[newState];
            toast(`Μετακινήθηκε σε ${sm.label}`, 'ok');
          }
          // Re-render counts/columns
          renderBoard();
        },
      });
    });
  }
}

function renderCard(w){
  const tm = TYPE_META[w.type] || TYPE_META.task;
  const av = w.assignee ? `<span class="av" title="${esc(w.assignee.display_name)}">${esc(initial(w.assignee.display_name))}</span>` : '';
  const kids = childrenOf(w.id);
  const kidsDone = kids.filter(k => k.state === 'closed').length;
  const kidsHtml = kids.length ? `<span class="children" title="${kidsDone}/${kids.length} children done">${kidsDone}/${kids.length}</span>` : '';
  const pts = w.story_points != null ? `<span class="pts">${w.story_points}</span>` : '';
  const pri = w.priority ? `<span class="pri p${w.priority}" title="Priority ${w.priority}">P${w.priority}</span>` : '';
  const tags = (w.tags || []).slice(0, 3).map(t => renderTagChip(t)).join(' ');
  return `<div class="card t-${w.type}" data-id="${esc(w.id)}">
    <div class="row1">
      <span class="type-ico">${tm.ico}</span>
      <span class="id">#${w.display_id || '—'}</span>
      ${pts}
    </div>
    <div class="ti">${esc(w.title)}</div>
    <div class="row3">
      ${pri}
      ${tags}
      ${kidsHtml}
      ${av ? '<span style="margin-left:auto">'+av+'</span>' : ''}
    </div>
  </div>`;
}

$('bl-new-top')      && ($('bl-new-top').onclick = ()=> openNewItemModal({}));
$('bl-save-view')    && ($('bl-save-view').onclick = saveCurrentView);

// ── Saved views (filter presets, per workspace, in localStorage) ─────
function savedViewsKey(){ return 'pm-ado:views:' + state.currentWsId; }
function getSavedViews(){
  try{ return JSON.parse(localStorage.getItem(savedViewsKey()) || '[]'); }catch{ return []; }
}
function setSavedViews(v){
  try{ localStorage.setItem(savedViewsKey(), JSON.stringify(v)); }catch{}
}
function currentFilterState(){
  return {
    type:     $('bl-type-filter')?.value || 'all',
    state:    $('bl-state-filter')?.value || 'open',
    tag:      $('bl-tag-filter')?.value || '',
    assignee: $('bl-assignee-filter')?.value || '',
  };
}
function filtersEqual(a, b){
  return a.type===b.type && a.state===b.state && a.tag===b.tag && a.assignee===b.assignee;
}
function applyView(f){
  if($('bl-type-filter'))     $('bl-type-filter').value = f.type;
  if($('bl-state-filter'))    $('bl-state-filter').value = f.state;
  if($('bl-assignee-filter')) $('bl-assignee-filter').value = f.assignee;
  // tag options are dynamic — refresh then set
  refreshBacklogTagFilter();
  if($('bl-tag-filter')){
    // If the saved tag no longer exists, fall back to "all"
    const has = [...$('bl-tag-filter').options].some(o => o.value === f.tag);
    $('bl-tag-filter').value = has ? f.tag : '';
  }
  renderBacklog();
  renderSavedViews();
}
function saveCurrentView(){
  const name = prompt('Όνομα προβολής:', '');
  if(name == null) return;
  const trimmed = name.trim();
  if(!trimmed){ toast('Απαιτείται όνομα','err'); return; }
  const views = getSavedViews();
  if(views.some(v => v.name === trimmed)){ toast('Υπάρχει ήδη προβολή με αυτό το όνομα','err'); return; }
  views.push({ id: crypto.randomUUID(), name: trimmed, filters: currentFilterState() });
  setSavedViews(views);
  renderSavedViews();
  toast(`Η προβολή "${trimmed}" αποθηκεύτηκε`, 'ok');
}
function renderSavedViews(){
  const el = $('saved-views');
  if(!el) return;
  const views = getSavedViews();
  if(!views.length){ el.innerHTML = ''; return; }
  const cur = currentFilterState();
  el.innerHTML = '<span class="sv-label">Προβολές</span>' +
    views.map(v => {
      const active = filtersEqual(v.filters, cur);
      return `<span class="sv-chip ${active?'active':''}" data-view="${esc(v.id)}">
        ${esc(v.name)}<span class="x" data-del-view="${esc(v.id)}" title="Διαγραφή">×</span>
      </span>`;
    }).join('');
  el.querySelectorAll('[data-view]').forEach(chip => chip.onclick = (e)=>{
    if(e.target.closest('[data-del-view]')) return;
    const v = getSavedViews().find(x => x.id === chip.dataset.view);
    if(v) applyView(v.filters);
  });
  el.querySelectorAll('[data-del-view]').forEach(x => x.onclick = (e)=>{
    e.stopPropagation();
    const id = x.dataset.delView;
    const v = getSavedViews().find(y => y.id === id);
    if(v && confirm(`Διαγραφή προβολής "${v.name}";`)){
      setSavedViews(getSavedViews().filter(y => y.id !== id));
      renderSavedViews();
    }
  });
}

// Track expanded state per item id (persist in localStorage so it survives reload)
const expandedKey = ()=> 'pm-ado:exp:'+state.currentProjectId;
function getExpanded(){
  try{ return new Set(JSON.parse(localStorage.getItem(expandedKey()) || '[]')); }catch{ return new Set(); }
}
function setExpanded(set){
  try{ localStorage.setItem(expandedKey(), JSON.stringify([...set])); }catch{}
}

function refreshBacklogTagFilter(){
  const tagSel = $('bl-tag-filter');
  if(!tagSel) return;
  const cur = tagSel.value;
  const tags = allTags();
  tagSel.innerHTML = '<option value="">Όλες οι ετικέτες</option>' +
    tags.map(t => `<option value="${esc(t)}" ${t===cur?'selected':''}>${esc(t)}</option>`).join('');
}

function refreshBacklogAssigneeFilter(){
  const sel = $('bl-assignee-filter');
  if(!sel) return;
  const cur = sel.value;
  const memberOpts = state.members
    .filter(m => m.id !== state.user.id)
    .map(m => `<option value="${esc(m.id)}" ${m.id===cur?'selected':''}>${esc(m.display_name)}</option>`)
    .join('');
  sel.innerHTML =
    `<option value="" ${cur===''?'selected':''}>Όλοι οι υπεύθυνοι</option>` +
    `<option value="__me__" ${cur==='__me__'?'selected':''}>Σε εμένα</option>` +
    `<option value="__none__" ${cur==='__none__'?'selected':''}>Χωρίς ανάθεση</option>` +
    memberOpts;
}

function renderBacklog(){
  // Always refresh tag-filter options (new tags from anywhere appear here)
  refreshBacklogTagFilter();
  refreshBacklogAssigneeFilter();
  renderSavedViews();

  if(!state.currentProjectId){
    $('bl-tree').innerHTML = '<div class="bl-empty">Δεν έχει επιλεγεί έργο</div>';
    return;
  }
  const typeF  = $('bl-type-filter')?.value  || 'all';
  const stateF = $('bl-state-filter')?.value || 'open';
  const tagF   = $('bl-tag-filter')?.value   || '';
  const asgF   = $('bl-assignee-filter')?.value || '';
  // Build filtered set
  const matches = (w) => {
    if(typeF !== 'all' && w.type !== typeF) return false;
    if(tagF && !(w.tags || []).includes(tagF)) return false;
    if(asgF){
      if(asgF === '__me__'  && w.assignee_id !== state.user.id) return false;
      if(asgF === '__none__' && w.assignee_id) return false;
      if(asgF !== '__me__' && asgF !== '__none__' && w.assignee_id !== asgF) return false;
    }
    if(stateF === 'open') return w.state !== 'closed';
    if(stateF !== 'all') return w.state === stateF;
    return true;
  };
  // If filtering by type, show flat (no hierarchy nesting because parents may not match).
  // If not filtering by type, show hierarchical tree starting from roots (items with no parent
  // or parent not in matches set).
  const matching = state.workItems.filter(matches);
  let rowsHtml = '';
  const expanded = getExpanded();

  if(typeF !== 'all' || tagF || asgF){
    // Flat list when filtering by type, tag, or assignee
    rowsHtml = matching.map(w => renderBacklogRow(w, 0, false, false)).join('');
  } else {
    // Tree
    const matchingIds = new Set(matching.map(w => w.id));
    const roots = matching.filter(w => !w.parent_id || !matchingIds.has(w.parent_id));
    function walk(w, depth){
      const kids = childrenOf(w.id).filter(matches);
      const isExp = expanded.has(w.id);
      rowsHtml += renderBacklogRow(w, depth, kids.length > 0, isExp);
      if(isExp){
        for(const k of kids) walk(k, depth+1);
      }
    }
    for(const r of roots) walk(r, 0);
  }

  const cols = activeBacklogColumns();
  const lead = ['24px','24px','70px','minmax(160px,1fr)'];
  const tmpl = [...lead, ...cols.map(c => c.width)].join(' ');
  // Total min width so the table can overflow-scroll on narrow screens
  const minW = 24 + 24 + 70 + 160 + cols.reduce((s,c)=> s + (parseInt(c.width)||100), 0) + (cols.length+4)*8;
  const headCells = cols.map(c =>
    `<div${(c.key==='remaining'||c.key==='points') ? ' style="text-align:right"' : ''}>${esc(c.label)}</div>`
  ).join('');
  $('bl-tree').style.minWidth = minW + 'px';
  $('bl-tree').innerHTML = `
    <div class="bl-h" style="grid-template-columns:${tmpl}">
      <div></div>
      <div></div>
      <div>ID</div>
      <div>Τίτλος</div>
      ${headCells}
    </div>
    ${rowsHtml || '<div class="bl-empty">Δεν υπάρχουν εργασίες που να ταιριάζουν με τα φίλτρα. Δοκιμάστε "+ Νέα εργασία" ή αλλάξτε φίλτρο.</div>'}`;

  // Wire
  $('bl-tree').querySelectorAll('.bl-row').forEach(row => {
    row.onclick = (e) => {
      if(e.target.closest('.add-child') || e.target.closest('.expand') || e.target.closest('.drag-handle')) return;
      openDetail(row.dataset.id);
    };
    const exp = row.querySelector('.expand');
    if(exp) exp.onclick = (e)=>{
      e.stopPropagation();
      const set = getExpanded();
      if(set.has(row.dataset.id)) set.delete(row.dataset.id);
      else set.add(row.dataset.id);
      setExpanded(set);
      renderBacklog();
    };
    const add = row.querySelector('.add-child');
    if(add) add.onclick = (e)=>{
      e.stopPropagation();
      openAddChildMenu(add, row.dataset.id);
    };
  });

  // Enable drag-to-reorder. Items can only be reordered among siblings
  // (same parent_id). Drops that would change parent are rejected and
  // we fall back to the original position.
  if(window.Sortable){
    const tree = $('bl-tree');
    if(tree._sortable){ tree._sortable.destroy(); }
    tree._sortable = new Sortable(tree, {
      handle: '.drag-handle',
      animation: 150,
      ghostClass: 'drag-ghost',
      chosenClass: 'drag-chosen',
      dragClass: 'drag-active',
      filter: '.bl-h',                  // header row not draggable
      preventOnFilter: false,
      forceFallback: true,
      fallbackTolerance: 4,
      onEnd: async (evt)=>{
        const row = evt.item;
        const itemId = row.dataset.id;
        const item = itemById(itemId);
        if(!item) return;
        // Determine new parent: look at the row above; if it is a valid
        // parent for this type, attach as its child; otherwise, attach
        // as sibling of whatever's above (i.e. same parent).
        const allRows = [...tree.querySelectorAll('.bl-row')];
        const idx = allRows.indexOf(row);
        const above = idx > 0 ? allRows[idx-1] : null;
        const below = idx < allRows.length - 1 ? allRows[idx+1] : null;
        let newParentId = null;
        if(above){
          const aboveItem = itemById(above.dataset.id);
          const aboveDepth = parseInt((above.className.match(/depth-(\d+)/)||[0,'0'])[1]);
          const myDepth   = parseInt((row.className.match(/depth-(\d+)/)||[0,'0'])[1]);
          if(aboveItem && myDepth > aboveDepth){
            // Visually placed under: check if valid child type
            if(TYPE_META[aboveItem.type]?.children?.includes(item.type)){
              newParentId = aboveItem.id;
            } else {
              // Invalid drop — revert
              toast(`Δεν είναι δυνατή η τοποθέτηση: ${TYPE_META[item.type].label} κάτω από ${TYPE_META[aboveItem.type].label}`, 'err');
              renderBacklog();
              return;
            }
          } else if(aboveItem){
            newParentId = aboveItem.parent_id;
          }
        }
        // Compute new position among siblings
        const newSiblings = allRows.filter(r => {
          const it = itemById(r.dataset.id);
          return it && it.parent_id === newParentId;
        });
        const myNewIdx = newSiblings.indexOf(row);
        const prevSib = myNewIdx > 0 ? itemById(newSiblings[myNewIdx-1].dataset.id) : null;
        const nextSib = myNewIdx < newSiblings.length - 1 ? itemById(newSiblings[myNewIdx+1].dataset.id) : null;
        const prevPos = prevSib?.position ?? null;
        const nextPos = nextSib?.position ?? null;
        let newPos;
        if(prevPos == null && nextPos == null) newPos = 1000;
        else if(prevPos == null)                newPos = nextPos - 1000;
        else if(nextPos == null)                newPos = prevPos + 1000;
        else                                    newPos = (prevPos + nextPos) / 2;

        const patch = { position: newPos };
        if(item.parent_id !== newParentId) patch.parent_id = newParentId;

        // Optimistic
        Object.assign(item, patch);
        const ok = await updateWorkItem(itemId, patch);
        if(!ok){
          await loadWorkItems();
        }
        renderBacklog();
      },
    });
  }
}

function renderBacklogCell(w, key){
  switch(key){
    case 'type': {
      const tm = TYPE_META[w.type] || TYPE_META.task;
      return `<div><span class="type-ico" title="${esc(tm.label)}">${tm.ico}</span> <span style="font-size:12px;color:var(--text2)">${esc(tm.label)}</span></div>`;
    }
    case 'priority': {
      if(!w.priority) return '<div></div>';
      return `<div><span class="pri p${w.priority}">P${w.priority}</span></div>`;
    }
    case 'assignee': {
      const av = w.assignee
        ? `<span class="av" title="${esc(w.assignee.display_name)}">${esc(initial(w.assignee.display_name))}</span><span>${esc(w.assignee.display_name)}</span>`
        : '<span style="color:var(--muted)">—</span>';
      return `<div class="av-name">${av}</div>`;
    }
    case 'state': {
      const sm = STATE_META[w.state] || STATE_META.new;
      return `<div><span class="state ${sm.class}">${esc(sm.label)}</span></div>`;
    }
    case 'tags': {
      const tags = (w.tags||[]).slice(0,3).map(t => renderTagChip(t)).join(' ');
      return `<div style="display:flex;gap:3px;flex-wrap:wrap;overflow:hidden">${tags || '<span style="color:var(--muted)">—</span>'}</div>`;
    }
    case 'iteration': {
      const it = state.iterations.find(i => i.id === w.iteration_id);
      return `<div style="font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it ? esc(it.name) : '<span style="color:var(--muted)">—</span>'}</div>`;
    }
    case 'target': {
      const td = w.custom_fields?.target_date;
      if(!td) return '<div style="color:var(--muted)">—</div>';
      const todayIso = new Date().toISOString().slice(0,10);
      const late = td <= todayIso && w.state !== 'closed';
      return `<div style="font-size:12px;color:${late ? 'var(--red)' : 'var(--text2)'}">${esc(td)}</div>`;
    }
    case 'points':
      return `<div class="rem-work">${w.story_points != null ? w.story_points : ''}</div>`;
    case 'remaining':
      return `<div class="rem-work">${w.remaining_work != null ? w.remaining_work : ''}</div>`;
    case 'updated':
      return `<div style="font-size:11px;color:var(--muted)">${esc(fmtTime(w.updated_at))}</div>`;
    default:
      return '<div></div>';
  }
}

function renderBacklogRow(w, depth, hasKids, isExp){
  const tm = TYPE_META[w.type] || TYPE_META.task;
  const childTypes = TYPE_META[w.type].children;
  const canAdd = childTypes.length > 0;
  const cols = activeBacklogColumns();
  const lead = ['24px','24px','70px','minmax(160px,1fr)'];
  const tmpl = [...lead, ...cols.map(c => c.width)].join(' ');
  const cells = cols.map(c => renderBacklogCell(w, c.key)).join('');
  return `<div class="bl-row depth-${Math.min(depth,4)}" data-id="${esc(w.id)}" style="grid-template-columns:${tmpl}">
    <div class="drag-handle" title="Σύρετε για αλλαγή σειράς">⋮⋮</div>
    <div class="expand ${hasKids?'':'none'} ${isExp?'open':''}">▶</div>
    <div class="id-cell">
      <span class="type-ico" title="${esc(tm.label)}">${tm.ico}</span>
      <span class="id">#${w.display_id || '—'}</span>
    </div>
    <div class="title-cell">
      <span class="ti">${esc(w.title)}</span>
      ${canAdd ? '<button class="add-child" title="Προσθήκη υποεργασίας">+</button>' : ''}
    </div>
    ${cells}
  </div>`;
}

function openAddChildMenu(anchor, parentId){
  const parent = itemById(parentId);
  if(!parent) return;
  const childTypes = TYPE_META[parent.type].children;
  if(!childTypes.length) return;
  // Close any existing menu
  document.querySelectorAll('.add-menu').forEach(m => m.remove());
  const r = anchor.getBoundingClientRect();
  const menu = document.createElement('div');
  menu.className = 'add-menu';
  menu.style.top = (r.bottom + 4) + 'px';
  menu.style.left = r.left + 'px';
  menu.innerHTML = childTypes.map(t => {
    const m = TYPE_META[t];
    return `<div class="item" data-t="${t}"><span class="type-ico">${m.ico}</span>Προσθήκη ${esc(m.label)}</div>`;
  }).join('');
  document.body.appendChild(menu);
  menu.querySelectorAll('[data-t]').forEach(it => it.onclick = ()=>{
    menu.remove();
    openNewItemModal({ type: it.dataset.t, parent_id: parentId });
  });
  // Click-outside dismiss
  setTimeout(()=>{
    const off = (e)=>{
      if(!menu.contains(e.target)){ menu.remove(); document.removeEventListener('click', off); }
    };
    document.addEventListener('click', off);
  }, 0);
}

function openNewItemModal({ type, parent_id, state: itemState }){
  if(!state.currentProjectId){ toast('Επιλέξτε πρώτα έργο','err'); return; }
  type = type || 'story';
  const parent = parent_id ? itemById(parent_id) : null;
  const root = $('modal-root');
  root.innerHTML = `
    <div class="modal-bg">
      <div class="modal">
        <div class="modal-h"><h3>Νέα ${TYPE_META[type].label}</h3><button class="x" id="mx">×</button></div>
        <div class="modal-b">
          ${parent ? `<div class="field"><label>Γονική εργασία</label><div style="padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:13px"><span style="font-family:var(--mono);color:var(--muted);font-size:11px">#${parent.display_id||'—'}</span> ${TYPE_META[parent.type].ico} ${esc(parent.title)}</div></div>` : ''}
          <div class="field"><label>Τύπος</label>
            <select id="ni-type">
              ${TYPE_ORDER.map(t => `<option value="${t}" ${t===type?'selected':''}>${TYPE_META[t].ico} ${TYPE_META[t].label}</option>`).join('')}
            </select>
          </div>
          <div class="field"><label>Τίτλος</label><input id="ni-title" maxlength="200" autofocus></div>
          <div class="field"><label>Περιγραφή (προαιρετικό)</label><textarea id="ni-desc"></textarea></div>
          <div class="field" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><label>Κατάσταση</label>
              <select id="ni-state">${STATE_ORDER.map(s => `<option value="${s}" ${s===(itemState||'new')?'selected':''}>${STATE_META[s].label}</option>`).join('')}</select>
            </div>
            <div><label>Προτεραιότητα</label>
              <select id="ni-priority">
                <option value="1">P1 — Κρίσιμη</option>
                <option value="2" selected>P2 — Υψηλή</option>
                <option value="3">P3 — Μέτρια</option>
                <option value="4">P4 — Χαμηλή</option>
              </select>
            </div>
          </div>
          <div class="field"><label>Υπεύθυνος</label>
            <select id="ni-assignee">
              <option value="">— Χωρίς ανάθεση —</option>
              ${state.members.map(m => `<option value="${esc(m.id)}">${esc(m.display_name)}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="modal-f">
          <button class="btn ghost" id="cancel">Άκυρο</button>
          <button class="btn" id="ok">Δημιουργία</button>
        </div>
      </div>
    </div>`;
  const close = ()=> root.innerHTML='';
  $('mx').onclick = close; $('cancel').onclick = close;
  setTimeout(()=> $('ni-title').focus(), 30);
  $('ok').onclick = async ()=>{
    const title = $('ni-title').value.trim();
    if(!title){ toast('Απαιτείται τίτλος','err'); return; }
    const payload = {
      type: $('ni-type').value,
      title,
      description: $('ni-desc').value.trim(),
      state: $('ni-state').value,
      priority: parseInt($('ni-priority').value),
      assignee_id: $('ni-assignee').value || null,
      parent_id: parent_id || null,
    };
    const id = await createWorkItem(payload);
    if(id){
      close();
      toast('Δημιουργήθηκε','ok');
      // If created from backlog with a parent, auto-expand the parent
      if(parent_id){
        const set = getExpanded(); set.add(parent_id); setExpanded(set);
      }
      rerenderCurrent();
    }
  };
}

function openDetail(id){
  state.backFrom = state.currentPage === 'detail' ? state.backFrom : state.currentPage;
  state.currentItemId = id;
  goPage('detail');
}

let detailComments = [];
async function loadDetailComments(){
  if(!state.currentItemId){ detailComments = []; renderDetail(); return; }
  const { data } = await sb
    .from('work_item_comments')
    .select('id, body, created_at, edited_at, user_id, author:user_id(display_name)')
    .eq('work_item_id', state.currentItemId)
    .order('created_at', { ascending: true });
  detailComments = data || [];
  const cm = document.getElementById('det-comments');
  if(cm){
    cm.innerHTML = renderCommentsHtml();
    wireCommentActions();
  }
}

let detailActivity = [];
async function loadDetailActivity(){
  if(!state.currentItemId){ detailActivity = []; return; }
  const { data } = await sb
    .from('work_item_activity')
    .select('id, field, old_value, new_value, created_at, user_id, author:user_id(display_name)')
    .eq('work_item_id', state.currentItemId)
    .order('created_at', { ascending: false })
    .limit(80);
  detailActivity = data || [];
  const el = document.getElementById('det-activity');
  if(el) el.innerHTML = renderActivityHtml();
}

// Human-readable formatting for activity entries
function activityFieldLabel(field){
  const map = {
    title:'τον τίτλο', state:'την κατάσταση', priority:'την προτεραιότητα', assignee_id:'τον υπεύθυνο',
    story_points:'τους πόντους', remaining_work:'το υπόλοιπο', parent_id:'τη γονική εργασία',
    iteration_id:'την περίοδο', tags:'τις ετικέτες', description:'την περιγραφή',
    custom_fields:'τα πεδία τύπου', created:'δημιουργήθηκε', deleted:'διαγράφηκε',
  };
  return map[field] || field;
}
function activityValue(field, raw){
  if(raw == null || raw === '') return '—';
  // Resolve UUIDs to friendlier names
  if(field === 'assignee_id'){
    const m = state.members.find(x => x.id === raw);
    return m ? m.display_name : 'κάποιον';
  }
  if(field === 'parent_id'){
    const p = state.workItems.find(x => x.id === raw);
    return p ? `#${p.display_id} ${p.title}` : 'μια εργασία';
  }
  if(field === 'iteration_id'){
    const it = state.iterations.find(x => x.id === raw);
    return it ? it.name : raw;
  }
  if(field === 'state'){
    return (STATE_META[raw] || {label:raw}).label;
  }
  if(field === 'priority'){
    return 'P' + raw;
  }
  return raw;
}
function renderActivityHtml(){
  if(!detailActivity.length){
    return '<div style="color:var(--muted);font-style:italic;font-size:12px">Δεν υπάρχει ιστορικό ακόμη.</div>';
  }
  return detailActivity.map(a => {
    const who = a.author?.display_name || 'Κάποιος';
    const fld = activityFieldLabel(a.field);
    let line;
    if(a.field === 'created'){
      const typeLabel = TYPE_META[a.new_value]?.label || 'εργασία';
      line = `δημιούργησε αυτή την ${esc(typeLabel)}`;
    } else if(a.field === 'deleted'){
      line = `διέγραψε αυτή την εργασία`;
    } else if(a.field === 'description' || a.field === 'custom_fields'){
      line = `επεξεργάστηκε ${esc(fld)}`;
    } else {
      const from = activityValue(a.field, a.old_value);
      const to   = activityValue(a.field, a.new_value);
      line = `άλλαξε ${esc(fld)} από <strong>${esc(from)}</strong> σε <strong>${esc(to)}</strong>`;
    }
    return `<div class="act">
      <div class="act-av">${esc(initial(who))}</div>
      <div class="act-body">
        <div><strong>${esc(who)}</strong> ${line}</div>
        <div class="act-ts">${esc(fmtTime(a.created_at))}</div>
      </div>
    </div>`;
  }).join('');
}

function renderCommentsHtml(){
  if(!detailComments.length) return '<div style="color:var(--muted);font-style:italic;font-size:13px;padding:8px 0">Δεν υπάρχουν σχόλια ακόμη. Ξεκινήστε τη συζήτηση.</div>';
  return detailComments.map(c => {
    const own = c.user_id === state.user.id;
    const editedLbl = c.edited_at ? ` · <span title="${esc(c.edited_at)}">επεξεργασμένο</span>` : '';
    return `
    <div class="comment" data-cid="${esc(c.id)}">
      <div class="av">${esc(initial(c.author?.display_name))}</div>
      <div class="body">
        <div class="head">
          <span class="nm">${esc(c.author?.display_name || 'Άγνωστο')}</span>
          <span class="ts">${esc(fmtTime(c.created_at))}${editedLbl}</span>
          ${own ? `<div class="cmt-actions">
            <button class="cmt-act-btn" data-act="edit"   title="Επεξεργασία">✎</button>
            <button class="cmt-act-btn" data-act="delete" title="Διαγραφή">🗑</button>
          </div>` : ''}
        </div>
        <div class="text md-body" data-cmt-body>${renderMentionsInHtml(renderMarkdown(c.body))}</div>
      </div>
    </div>`;
  }).join('');
}

// Wire edit/delete buttons on rendered comments
function wireCommentActions(){
  const root = document.getElementById('det-comments');
  if(!root) return;
  root.querySelectorAll('.comment').forEach(el => {
    const cid = el.dataset.cid;
    const c = detailComments.find(x => x.id === cid);
    if(!c || c.user_id !== state.user.id) return;
    el.querySelectorAll('.cmt-act-btn').forEach(b => b.onclick = (e)=>{
      e.stopPropagation();
      if(b.dataset.act === 'delete') return deleteComment(cid);
      if(b.dataset.act === 'edit')   return startEditComment(cid, el);
    });
  });
}

async function deleteComment(cid){
  if(!confirm('Διαγραφή σχολίου;')) return;
  const { error } = await sb.from('work_item_comments').delete().eq('id', cid);
  if(error){ toast(friendlyError(error),'err'); return; }
  // Clear notifications tied to this comment (cascade also handles it)
  await sb.from('notifications').delete().eq('comment_id', cid);
  toast('Διαγράφηκε', 'ok');
  loadDetailComments();
}

function startEditComment(cid, el){
  const c = detailComments.find(x => x.id === cid);
  if(!c) return;
  const bodyEl = el.querySelector('[data-cmt-body]');
  if(!bodyEl) return;
  const orig = c.body;
  const ta = document.createElement('textarea');
  ta.className = 'det-desc-edit';
  ta.style.minHeight = '60px';
  ta.value = orig;

  const actBar = document.createElement('div');
  actBar.className = 'attach-bar';
  const save = document.createElement('button');
  save.type = 'button';
  save.className = 'btn sm';
  save.textContent = 'Αποθήκευση';
  const cancel = document.createElement('button');
  cancel.type = 'button';
  cancel.className = 'btn ghost sm';
  cancel.textContent = 'Άκυρο';
  actBar.appendChild(document.createElement('span')).style.flex = '1';
  actBar.appendChild(cancel);
  actBar.appendChild(save);

  const wrap = document.createElement('div');
  wrap.appendChild(ta);
  wrap.appendChild(actBar);
  bodyEl.replaceWith(wrap);
  // Hide the actions row while editing
  el.querySelector('.cmt-actions')?.classList.add('hidden');
  ta.focus();

  wireMentionAutocomplete(ta);

  cancel.onclick = ()=> loadDetailComments();
  ta.onkeydown = (e)=>{
    if(e.key === 'Escape'){ loadDetailComments(); }
    if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){ save.click(); }
  };
  save.onclick = async ()=>{
    const v = ta.value.trim();
    if(!v){ toast('Το σχόλιο δεν μπορεί να είναι κενό','err'); return; }
    if(v === orig){ loadDetailComments(); return; }
    const { error } = await sb
      .from('work_item_comments')
      .update({ body: v, edited_at: new Date().toISOString() })
      .eq('id', cid);
    if(error){ toast(friendlyError(error),'err'); return; }
    // Recompute mention notifications: drop old mention rows for this comment, insert new
    await sb.from('notifications').delete().eq('comment_id', cid).eq('kind', 'mention');
    const mentions = parseMentions(v).filter(m => m.id !== state.user.id);
    if(mentions.length){
      await sb.from('notifications').insert(mentions.map(m => ({
        recipient_id: m.id,
        actor_id: state.user.id,
        work_item_id: c.work_item_id || state.currentItemId,
        workspace_id: state.currentWsId,
        comment_id: cid,
        kind: 'mention',
      })));
    }
    toast('Αποθηκεύτηκε', 'ok');
    loadDetailComments();
  };
}

      input.value = '';
      addTag(v);
      input.focus();

    $('det-comment-att-input').value = '';
  };

  $('det-comment-send').onclick = async ()=>{
    const body = $('det-comment-input').value.trim();
    if(!body) return;
    $('det-comment-input').value = '';
    const commentId = crypto.randomUUID();
    const { error } = await sb.from('work_item_comments').insert({
      id: commentId, work_item_id: id, user_id: state.user.id, body
    });
    if(error){ toast(friendlyError(error),'err'); return; }
    // Auto-watch: commenting means you care about this item
    await ensureWatching(id);
    // Write mention notifications (skip self-mentions)
    const mentions = parseMentions(body).filter(m => m.id !== state.user.id);
    if(mentions.length){
      const rows = mentions.map(m => ({
        recipient_id: m.id,
        actor_id: state.user.id,
        work_item_id: id,
        workspace_id: state.currentWsId,
        comment_id: commentId,
        kind: 'mention',
      }));
      const { error: mErr } = await sb.from('notifications').insert(rows);
      if(mErr){ console.warn('Mention notifications failed:', mErr); }
    }
    loadDetailComments();
  };

  document.querySelectorAll('[data-go]').forEach(el => el.onclick = ()=> openDetail(el.dataset.go));

  const addChildBtn = $('add-child-btn');
  if(addChildBtn) addChildBtn.onclick = ()=>{
    const t = TYPE_META[w.type].children[0];
    openNewItemModal({ type: t, parent_id: id });
  };
  const setParentBtn = $('set-parent-btn');
  if(setParentBtn) setParentBtn.onclick = ()=> openSetParentModal(id);
}

function openSetParentModal(id){
  const w = itemById(id);
  if(!w) return;
  // Valid parents: items whose type allows this item's type as a child
  const validParents = state.workItems.filter(p =>
    p.id !== id &&
    TYPE_META[p.type]?.children?.includes(w.type)
  );
  const root = $('modal-root');
  root.innerHTML = `
    <div class="modal-bg">
      <div class="modal">
        <div class="modal-h"><h3>Ορισμός γονικού</h3><button class="x" id="mx">×</button></div>
        <div class="modal-b">
          ${validParents.length === 0 ? `<div style="color:var(--muted);font-style:italic">Δεν υπάρχει έγκυρη γονική εργασία. Δημιουργήστε πρώτα μια ${TYPE_META[w.type === 'task' || w.type === 'bug' ? 'story' : (w.type === 'story' ? 'feature' : 'epic')].label}.</div>` : `
          <div class="field"><label>Επιλέξτε γονική</label>
            <select id="sp-pid">
              <option value="">— Καμία —</option>
              ${validParents.map(p => `<option value="${esc(p.id)}">${TYPE_META[p.type].ico} #${p.display_id||'—'} ${esc(p.title)}</option>`).join('')}
            </select>
          </div>`}
        </div>
        <div class="modal-f">
          <button class="btn ghost" id="cancel">Άκυρο</button>
          <button class="btn" id="ok" ${validParents.length === 0 ? 'disabled' : ''}>Αποθήκευση</button>
        </div>
      </div>
    </div>`;
  const close = ()=> root.innerHTML='';
  $('mx').onclick = close; $('cancel').onclick = close;
  if(validParents.length){
    $('ok').onclick = async ()=>{
      const pid = $('sp-pid').value || null;
      const ok = await updateWorkItem(id, { parent_id: pid });
      if(ok){ close(); renderDetail(); }
    };
  }
}

// SPRINTS PAGE
// ════════════════════════════════════════════════════════════════════
async function renderSprintsPage(){
  // Populate iteration picker
  const sel = $('sp-iteration');
  // Pick a default iteration if none set yet
  if(!state.currentIterationId){
    state.currentIterationId = currentIteration()?.id || '';
  }
  sel.innerHTML = '<option value="">— Δεν έχει επιλεγεί περίοδος —</option>' +
    state.iterations.map(it => {
      const d = (it.start_date && it.end_date)
        ? ` (${it.start_date} → ${it.end_date})`
        : '';
      return `<option value="${esc(it.id)}" ${it.id===state.currentIterationId?'selected':''}>${esc(it.name)}${d}</option>`;
    }).join('');
  sel.onchange = ()=>{ state.currentIterationId = sel.value; renderSprintsPage(); };
  $('sp-manage').onclick = openManageIterationsModal;

  const board = $('sp-board');

  if(!state.iterations.length){
    board.innerHTML = `
      <div class="sp-empty">
        <div class="ti">Δεν υπάρχουν περίοδοι ακόμη</div>
        <div>Οι περίοδοι ομαδοποιούν την εργασία σε χρονικά πλαίσια. Δημιουργήστε μία για να ξεκινήσετε.</div>
        <button class="btn" style="margin-top:12px" id="sp-empty-new">+ Νέα περίοδος</button>
      </div>`;
    $('sp-meta').textContent = '';
    const emptyNew = $('sp-empty-new');
    if(emptyNew) emptyNew.onclick = openManageIterationsModal;
    return;
  }
  if(!state.currentIterationId){
    board.innerHTML = '<div class="sp-empty"><div class="ti">Επιλέξτε μια περίοδο παραπάνω</div></div>';
    $('sp-meta').textContent = '';
    return;
  }

  // Populate assignee filter with current workspace members (preserve selection)
  const asgSel = $('sp-assignee-filter');
  if(asgSel){
    const curAsg = asgSel.value;
    asgSel.innerHTML =
      `<option value="" ${curAsg===''?'selected':''}>Όλοι οι υπεύθυνοι</option>` +
      `<option value="__me__" ${curAsg==='__me__'?'selected':''}>Σε εμένα</option>` +
      `<option value="__none__" ${curAsg==='__none__'?'selected':''}>Χωρίς ανάθεση</option>` +
      state.members.map(m => `<option value="${esc(m.id)}" ${curAsg===m.id?'selected':''}>${esc(m.display_name)}</option>`).join('');
    asgSel.onchange = renderSprintsPage;
  }

  // Pull items in this iteration across all projects in the workspace
  const { data: items, error } = await sb
    .from('work_items')
    .select('id, project_id, type, title, state, priority, story_points, assignee_id, tags, display_id, position, assignee:assignee_id(id, display_name)')
    .eq('workspace_id', state.currentWsId)
    .eq('iteration_id', state.currentIterationId)
    .order('position', { ascending: true, nullsFirst: false });
  if(error){ toast('Εργασίες περιόδου: '+friendlyError(error),'err'); return; }
  let list = items || [];

  // Apply assignee filter
  const asgF = asgSel?.value || '';
  if(asgF === '__me__')      list = list.filter(w => w.assignee_id === state.user.id);
  else if(asgF === '__none__') list = list.filter(w => !w.assignee_id);
  else if(asgF)              list = list.filter(w => w.assignee_id === asgF);

  // Stats
  const totalPts = list.reduce((s,i) => s + (i.story_points || 0), 0);
  const donePts  = list.filter(i => i.state === 'closed').reduce((s,i) => s + (i.story_points || 0), 0);
  const it = state.iterations.find(i => i.id === state.currentIterationId);
  const dateRange = (it.start_date && it.end_date) ? `${it.start_date} → ${it.end_date}` : 'Χωρίς ημερομηνίες';
  $('sp-meta').textContent = `${list.length} εργασίες · ${dateRange}`;

  const projById = Object.fromEntries(state.projects.map(p => [p.id, p]));

  const byState = { new:[], active:[], resolved:[], closed:[] };
  for(const w of list){ (byState[w.state] || byState.new).push(w); }

  const cols = STATE_ORDER.map(s => {
    const meta = STATE_META[s];
    const arr = byState[s] || [];
    return `<div class="col">
      <div class="col-h"><div class="ti">${meta.label}</div><div class="cnt">${arr.length}</div></div>
      <div class="col-body">
        ${arr.map(w => {
          const tm = TYPE_META[w.type] || TYPE_META.task;
          const av = w.assignee ? `<span class="av" title="${esc(w.assignee.display_name)}">${esc(initial(w.assignee.display_name))}</span>` : '';
          const pts = w.story_points != null ? `<span class="pts">${w.story_points}</span>` : '';
          const pri = w.priority ? `<span class="pri p${w.priority}">P${w.priority}</span>` : '';
          const proj = projById[w.project_id];
          const tags = (w.tags || []).slice(0,2).map(t => renderTagChip(t)).join(' ');
          return `<div class="card t-${w.type}" data-id="${esc(w.id)}">
            <div class="row1">
              <span class="type-ico">${tm.ico}</span>
              <span class="id">#${w.display_id || '—'}</span>
              ${proj ? `<span style="margin-left:6px;font-size:10px;color:var(--muted)">${esc(proj.name)}</span>` : ''}
              ${pts}
            </div>
            <div class="ti">${esc(w.title)}</div>
            <div class="row3">${pri}${tags ? ' '+tags : ''}${av ? '<span style="margin-left:auto">'+av+'</span>' : ''}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  board.innerHTML = `
    <div class="sp-stats">
      <div class="stat"><strong>${list.length}</strong>Συνολικές εργασίες</div>
      <div class="stat"><strong>${totalPts}</strong>Συνολικοί πόντοι</div>
      <div class="stat"><strong>${donePts}</strong>Ολοκληρωμένοι πόντοι</div>
      <div class="stat"><strong>${totalPts > 0 ? Math.round(donePts/totalPts*100) : 0}%</strong>Πρόοδος</div>
    </div>
    <div class="sp-board">${cols}</div>`;
  board.querySelectorAll('.card').forEach(c => c.onclick = ()=> openDetail(c.dataset.id));
}

function openManageIterationsModal(){
  const root = $('modal-root');
  root.innerHTML = `
    <div class="modal-bg">
      <div class="modal" style="max-width:560px">
        <div class="modal-h"><h3>Διαχείριση περιόδων</h3><button class="x" id="mx">×</button></div>
        <div class="modal-b">
          <div id="it-list" style="margin-bottom:14px"></div>
          <div style="border-top:1px solid var(--border);padding-top:14px">
            <div style="font-weight:600;font-size:13px;margin-bottom:8px">Νέα περίοδος</div>
            <div class="field"><label>Όνομα</label><input id="it-name" placeholder="π.χ. Περίοδος Q3" maxlength="60"></div>
            <div class="field row" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div><label>Ημ/νία έναρξης</label><input type="date" id="it-start"></div>
              <div><label>Ημ/νία λήξης</label><input type="date" id="it-end"></div>
            </div>
            <button class="btn" id="it-add">+ Προσθήκη περιόδου</button>
          </div>
        </div>
        <div class="modal-f"><button class="btn ghost" id="close">Κλείσιμο</button></div>
      </div>
    </div>`;
  const close = ()=> root.innerHTML='';
  $('mx').onclick = close; $('close').onclick = close;

  function renderList(){
    if(!state.iterations.length){
      $('it-list').innerHTML = '<div style="color:var(--muted);font-style:italic;font-size:13px">Δεν υπάρχουν περίοδοι ακόμη</div>';
      return;
    }
    $('it-list').innerHTML = state.iterations.map(it => {
      const d = (it.start_date && it.end_date) ? `${it.start_date} → ${it.end_date}` : '(χωρίς ημερομηνίες)';
      return `<div style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:13px">${esc(it.name)}</div>
          <div style="font-size:11px;color:var(--muted)">${esc(d)}</div>
        </div>
        <button class="btn ghost sm" data-del="${esc(it.id)}">Διαγραφή</button>
      </div>`;
    }).join('');
    $('it-list').querySelectorAll('[data-del]').forEach(b => b.onclick = async ()=>{
      if(!confirm('Διαγραφή περιόδου; Οι εργασίες θα χάσουν τη σύνδεση με αυτήν.')) return;
      const { error } = await sb.from('iterations').delete().eq('id', b.dataset.del);
      if(error){ toast(friendlyError(error),'err'); return; }
      await loadIterations();
      renderList();
      if(state.currentIterationId === b.dataset.del){
        state.currentIterationId = null;
      }
    });
  }
  renderList();

  $('it-add').onclick = async ()=>{
    const name = $('it-name').value.trim();
    if(!name){ toast('Απαιτείται όνομα','err'); return; }
    const payload = {
      id: crypto.randomUUID(),
      workspace_id: state.currentWsId,
      name,
      start_date: $('it-start').value || null,
      end_date: $('it-end').value || null,
      created_by: state.user.id,
    };
    const { error } = await sb.from('iterations').insert(payload);
    if(error){ toast(friendlyError(error),'err'); return; }
    $('it-name').value = ''; $('it-start').value = ''; $('it-end').value = '';
    await loadIterations();
    renderList();
    toast('Η περίοδος δημιουργήθηκε','ok');
  };
}

      saveBacklogColumns();
      toast('Οι στήλες ενημερώθηκαν', 'ok');
    });
  }
  renderColList();

  $('settings-reset').onclick = ()=>{
    state.backlogColumns = BACKLOG_COLUMNS.filter(c => c.on).map(c => c.key);
    saveBacklogColumns();
    renderColList();
    toast('Έγινε επαναφορά', 'ok');
  };
}

// MEMBERS PAGE (minimal — list + invite)
// ════════════════════════════════════════════════════════════════════
async function renderMembers(){
  const el = $('members-content');
  el.innerHTML = '<div style="padding:20px;color:var(--muted)">Φόρτωση…</div>';

  const canManage = state.currentRole === 'owner' || state.currentRole === 'admin';

  // Members + pending invitations in parallel
  const [memRes, invRes] = await Promise.all([
    sb.from('workspace_members')
      .select('user_id, role, profiles:user_id(id, display_name, email)')
      .eq('workspace_id', state.currentWsId),
    sb.from('invitations')
      .select('id, email, invited_by, created_at, expires_at, accepted_at')
      .eq('workspace_id', state.currentWsId)
      .is('accepted_at', null)
      .order('created_at', { ascending: false }),
  ]);
  const mems = (memRes.data || []).map(r => ({ ...r.profiles, role: r.role })).filter(p => p.id);
  const nowIso = new Date().toISOString();
  const pending = (invRes.data || []).filter(i => i.expires_at > nowIso);
  const expired = (invRes.data || []).filter(i => i.expires_at <= nowIso);

  const roleLabel = { owner:'Ιδιοκτήτης', admin:'Διαχειριστής', member:'Μέλος' };

  function memberRow(m){
    const isSelf = m.id === state.user.id;
    const isOwner = m.role === 'owner';
    // Owner/admins can manage non-owner rows; nobody manages the owner via UI.
    const showControls = canManage && !isOwner;
    const roleCell = showControls
      ? `<select class="mem-role" data-uid="${esc(m.id)}" style="font-size:12px;padding:3px 6px">
           ${['admin','member'].map(r => `<option value="${r}" ${m.role===r?'selected':''}>${roleLabel[r]}</option>`).join('')}
         </select>`
      : `<span style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600">${esc(roleLabel[m.role]||m.role)}</span>`;
    const removeBtn = (canManage && !isOwner && !isSelf)
      ? `<button class="btn ghost sm mem-remove" data-uid="${esc(m.id)}" title="Αφαίρεση">✕</button>`
      : (isSelf && !isOwner ? `<button class="btn ghost sm mem-leave" title="Αποχώρηση">Αποχώρηση</button>` : '');
    return `<div class="mem-row">
      <div class="mem-av">${esc(initial(m.display_name))}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px">${esc(m.display_name)}${isSelf?' (εσείς)':''}</div>
        <div style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.email||'')}</div>
      </div>
      ${roleCell}
      ${removeBtn}
    </div>`;
  }

  function inviteRow(i, isExpired){
    const who = state.members.find(x => x.id === i.invited_by)?.display_name || '';
    const cancel = canManage
      ? `<button class="btn ghost sm inv-cancel" data-id="${esc(i.id)}" title="Ακύρωση">✕</button>` : '';
    return `<div class="mem-row">
      <div class="mem-av" style="background:var(--surface2);color:var(--muted)">✉</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px">${esc(i.email)}</div>
        <div style="font-size:11px;color:var(--muted)">${isExpired ? 'Έληξε' : 'Εκκρεμεί'}${who?` · προσκλήθηκε από ${esc(who)}`:''}</div>
      </div>
      <span style="font-size:11px;color:${isExpired?'var(--red)':'var(--muted)'};font-weight:600">${isExpired?'ΕΛΗΞΕ':'ΕΚΚΡΕΜΕΙ'}</span>
      ${cancel}
    </div>`;
  }

  el.innerHTML = `
    <h2 style="font-size:16px;font-weight:600;margin-bottom:14px">Ομάδα</h2>

    ${canManage ? `
    <div class="team-card">
      <h3 class="team-h">Πρόσκληση μέλους</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input id="inv-email" type="email" placeholder="email@example.com" autocomplete="off"
               style="flex:1;min-width:180px">
        <button class="btn" id="inv-send">Αποστολή πρόσκλησης</button>
      </div>
      <div class="md-hint" style="margin-top:6px">Η πρόσκληση εμφανίζεται στην εφαρμογή του παραλήπτη για αποδοχή — ακόμη κι αν δεν έχει λογαριασμό ακόμη. Λήγει σε 7 ημέρες.</div>
    </div>` : ''}

    <div class="team-card">
      <h3 class="team-h">Μέλη (${mems.length})</h3>
      <div class="mem-list">${mems.map(memberRow).join('')}</div>
    </div>

    ${(pending.length || expired.length) ? `
    <div class="team-card">
      <h3 class="team-h">Προσκλήσεις σε εκκρεμότητα${pending.length?` (${pending.length})`:''}</h3>
      <div class="mem-list">
        ${pending.map(i => inviteRow(i, false)).join('')}
        ${expired.map(i => inviteRow(i, true)).join('')}
      </div>
    </div>` : ''}
  `;

  // ── Wire: send invite ──
  if(canManage){
    const sendBtn = $('inv-send');
    const emailInput = $('inv-email');
    async function sendInvite(){
      const email = (emailInput.value || '').trim().toLowerCase();
      if(!email){ toast('Συμπληρώστε email','err'); return; }
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ toast('Μη έγκυρο email','err'); return; }
      // Already a member?
      if(mems.some(m => (m.email||'').toLowerCase() === email)){
        toast('Είναι ήδη μέλος','err'); return;
      }
      // Already invited (pending)?
      if(pending.some(i => i.email.toLowerCase() === email)){
        toast('Έχει ήδη προσκληθεί','err'); return;
      }
      sendBtn.disabled = true;
      const { error } = await sb.from('invitations').insert({
        id: crypto.randomUUID(),
        workspace_id: state.currentWsId,
        email,
        invited_by: state.user.id,
      });
      sendBtn.disabled = false;
      if(error){ toast(friendlyError(error),'err'); return; }
      emailInput.value = '';
      toast('Η πρόσκληση στάλθηκε','ok');
      renderMembers();
    }
    sendBtn.onclick = sendInvite;
    emailInput.onkeydown = (e)=>{ if(e.key === 'Enter'){ e.preventDefault(); sendInvite(); } };
  }

  // ── Wire: change role ──
  el.querySelectorAll('.mem-role').forEach(sel => sel.onchange = async ()=>{
    const uid = sel.dataset.uid;
    const newRole = sel.value;
    const { error } = await sb.from('workspace_members')
      .update({ role: newRole }).eq('workspace_id', state.currentWsId).eq('user_id', uid);
    if(error){ toast(friendlyError(error),'err'); renderMembers(); return; }
    toast('Ο ρόλος ενημερώθηκε','ok');
  });

  // ── Wire: remove member ──
  el.querySelectorAll('.mem-remove').forEach(b => b.onclick = async ()=>{
    const uid = b.dataset.uid;
    const m = mems.find(x => x.id === uid);
    if(!confirm(`Αφαίρεση ${m?.display_name || 'μέλους'} από τον χώρο εργασίας;`)) return;
    const { error } = await sb.from('workspace_members')
      .delete().eq('workspace_id', state.currentWsId).eq('user_id', uid);
    if(error){ toast(friendlyError(error),'err'); return; }
    toast('Το μέλος αφαιρέθηκε','ok');
    renderMembers();
  });

  // ── Wire: leave workspace (self) ──
  const leaveBtn = el.querySelector('.mem-leave');
  if(leaveBtn) leaveBtn.onclick = async ()=>{
    if(!confirm('Αποχώρηση από τον χώρο εργασίας;')) return;
    const { error } = await sb.from('workspace_members')
      .delete().eq('workspace_id', state.currentWsId).eq('user_id', state.user.id);
    if(error){ toast(friendlyError(error),'err'); return; }
    location.reload();
  };

  // ── Wire: cancel invite ──
  el.querySelectorAll('.inv-cancel').forEach(b => b.onclick = async ()=>{
    const id = b.dataset.id;
    const { error } = await sb.from('invitations').delete().eq('id', id);
    if(error){ toast(friendlyError(error),'err'); return; }
    toast('Η πρόσκληση ακυρώθηκε','ok');
    renderMembers();
  });
}

// ════════════════════════════════════════════════════════════════════
// SEARCH (workspace-wide, debounced, full-text)
// ════════════════════════════════════════════════════════════════════
let searchDebounce = null;
let searchSeq = 0;  // ignore stale responses
const searchInput = $('search-input');
const searchResults = $('search-results');

function closeSearch(){
  searchResults.classList.add('hidden');
}

searchInput.addEventListener('input', ()=>{
  clearTimeout(searchDebounce);
  const q = searchInput.value.trim();
  if(!q){ closeSearch(); return; }
  searchDebounce = setTimeout(()=> runSearch(q), 200);
});
searchInput.addEventListener('focus', ()=>{
  if(searchInput.value.trim()) searchResults.classList.remove('hidden');
});
searchInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape'){ searchInput.value = ''; closeSearch(); searchInput.blur(); }
});

// Click outside closes
document.addEventListener('click', (e)=>{
  if(!e.target.closest('#search-wrap')) closeSearch();
});

// Ctrl+/ focuses
document.addEventListener('keydown', (e)=>{
  if((e.ctrlKey || e.metaKey) && e.key === '/'){
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
});

async function runSearch(q){
  if(!state.currentWsId) return;
  searchResults.classList.remove('hidden');
  searchResults.innerHTML = '<div class="sr-loading">Αναζήτηση…</div>';
  const seq = ++searchSeq;

  // Try exact display_id match (e.g. "17" or "#17")
  const idMatch = q.match(/^#?(\d+)$/);
  const tsQuery = q
    .split(/\s+/)
    .filter(Boolean)
    .map(t => t.replace(/[^a-zA-Z0-9_]/g,'') + ':*')
    .join(' & ');

  let query = sb.from('work_items')
    .select('id, type, title, state, display_id, project_id, projects:project_id(name)')
    .eq('workspace_id', state.currentWsId)
    .limit(20);

  if(idMatch){
    query = query.eq('display_id', parseInt(idMatch[1], 10));
  } else if(tsQuery){
    // Postgres @@ via textSearch — supabase-js exposes `textSearch`
    query = query.textSearch('search_tsv', tsQuery, { config: 'simple' });
  } else {
    // Fallback to ILIKE on title
    query = query.ilike('title', '%' + q + '%');
  }

  const { data, error } = await query;
  if(seq !== searchSeq) return;  // stale
  if(error){
    searchResults.innerHTML = '<div class="sr-empty">Σφάλμα αναζήτησης: ' + esc(friendlyError(error)) + '</div>';
    return;
  }
  if(!data || !data.length){
    searchResults.innerHTML = '<div class="sr-empty">Κανένα αποτέλεσμα για "' + esc(q) + '"</div>';
    return;
  }
  searchResults.innerHTML = data.map(r => {
    const tm = TYPE_META[r.type] || TYPE_META.task;
    return `<div class="sr-item" data-id="${esc(r.id)}" data-pid="${esc(r.project_id)}">
      <span class="type-ico">${tm.ico}</span>
      <span class="id">#${r.display_id || '—'}</span>
      <span class="ti">${esc(r.title)}</span>
      <span class="proj">${esc(r.projects?.name || '')}</span>
    </div>`;
  }).join('');
  searchResults.querySelectorAll('.sr-item').forEach(item => item.onclick = async ()=>{
    const pid = item.dataset.pid;
    const id  = item.dataset.id;
    closeSearch();
    searchInput.value = '';
    // If the item belongs to a different project than the one we're in,
    // switch projects first so the detail view has its parent/child links.
    if(pid !== state.currentProjectId){
      await selectProject(pid);
    }
    openDetail(id);
  });
}


// ════════════════════════════════════════════════════════════════════
// THEME
// ════════════════════════════════════════════════════════════════════
function applyTheme(){
  const t = localStorage.getItem('pm-ado:theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
}
$('theme-toggle').onclick = ()=>{
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  try{ localStorage.setItem('pm-ado:theme', next); }catch{}
};
applyTheme();

// ════════════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════════════
async function boot(){
  try{
    const { data: { session } } = await sb.auth.getSession();
    if(session?.user){
      await enterApp(session.user);   // loads data + restores view before revealing
      hide('boot');
    } else {
      hide('boot');
      show('auth');
    }
  }catch(e){
    hide('boot');
    show('auth');
    toast('Σφάλμα εκκίνησης: ' + (e?.message || e), 'err');
  }finally{
    bootDone = true;
  }
}

async function enterApp(user){
  // Guard: if we're already in/entering the app for this user, do nothing.
  if(state.user && state.user.id === user.id && (entering || $('app').classList.contains('show'))){
    return;
  }
  entering = true;
  state.user = user;
  state.profile = await ensureProfile(user);
  $('user-nm').textContent = state.profile.display_name;
  $('user-av').textContent = initial(state.profile.display_name);
  hide('auth');
  // Capture the deep-link hash the user arrived with (refresh/bookmark),
  // THEN seed a baseline overview entry beneath it so the first back press
  // stays in-app. restoreLastView() will navigate to bootHash if present.
  const bootHash = location.hash;
  try{ history.replaceState({ page:'overview' }, '', '#overview'); }catch{}
  if(bootHash && bootHash !== '#overview'){
    try{ history.pushState({}, '', bootHash); }catch{}
  }
  // Load data and restore the view BEFORE revealing the app, so the user
  // never sees a blank overview flash on refresh.
  await loadWorkspaces();
  $('app').classList.add('show');
  subscribeUserMentions();
  entering = false;
}

boot();
</script>
